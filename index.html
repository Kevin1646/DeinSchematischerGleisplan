<script>
  "use strict";
  // Alles erst nach DOM-Ladung starten
  document.addEventListener("DOMContentLoaded", () => {

    /* =========================
     *   Konstanten & Setup
     * ========================= */
    const canvas = document.getElementById("drawing-canvas");
    const ctx = canvas.getContext("2d");
    const paperSelector = document.getElementById("paper-size-selector");
    const controlsContainer = document.getElementById("main-controls");



    // DIN-Größen in Millimetern (hier als cm-Werte benutzt)
    const PAPER_SIZES = {
      A4_landscape: { name: "A4 Querformat", width: 297, height: 210 },
      A4_portrait: { name: "A4 Hochformat", width: 210, height: 297 },
      A3_landscape: { name: "A3 Querformat", width: 420, height: 297 },
      A3_portrait: { name: "A3 Hochformat", width: 297, height: 420 },
      A2_landscape: { name: "A2 Querformat", width: 594, height: 420 },
      A2_portrait: { name: "A2 Hochformat", width: 420, height: 594 },
      A1_landscape: { name: "A1 Querformat", width: 841, height: 594 },
      A1_portrait: { name: "A1 Hochformat", width: 594, height: 841 },
    };
    // Aktuelles Papierformat (wird dynamisch angepasst)
    let currentPaperSize = { width: PAPER_SIZES.A3_landscape.width, height: PAPER_SIZES.A3_landscape.height };


    // Pixel pro cm (96 DPI als Web-Standard)
    const PIXELS_PER_CM = 96 / 2.54;

    // Rasterabstände in cm
    const hGridSpacingCM = 0.25; // horizontaler Abstand
    const vGridSpacingCM = 0.5; // vertikaler Abstand

    // Standard-Text-Einstellungen
    const DEFAULT_TEXT_SETTINGS = {
      fontSize: 5,
      color: "black",
      fontWeight: "normal",
      fontStyle: "normal",
      widthCM: 0.13,
      heightCM: 0.1,
      align: "center",
    };

    // ================================
    // Beschriftungs-Positionen (cm)
    // ================================
    const LABEL_POSITIONS = {
      // Signale
      Mehrabschnittssignale: [
        { dxCM: -0.25, dyCM: -0.2 },
      ],
      Hauptsignale: [
        { dxCM: -0.25, dyCM: -0.2 },

      ],
      Vorsignale: [
        { dxCM: -0.25, dyCM: -0.2 },
      ],
      Rangiersignale: [
        { dxCM: -0.5, dyCM: 0 },
      ],
      Zusatzsignale: [
        { dxCM: 2, dyCM: 0.3 },
      ],
      Signale: [
        { dxCM: 0, dyCM: 0.2 },
      ],
      Verkehr: [

      ],
      "[14] Abgrenzungen":  [
        { dxCM: -0.8, dyCM: -0.4 },
        { dxCM: -0.8, dyCM: -0.2 },
        { dxCM: -0.8, dyCM:  0.0},
        { dxCM: -0.8, dyCM: 0.2 },
        { dxCM: -0.8, dyCM: 0.4 },
        { dxCM: -0.8, dyCM: 0.6 },
        { dxCM: 0.2, dyCM: -0.4 },
        { dxCM: 0.2, dyCM: -0.2 },
        { dxCM: 0.2, dyCM:  0.0},
        { dxCM: 0.2, dyCM: 0.2 },
        { dxCM: 0.2, dyCM: 0.4 },
        { dxCM: 0.2, dyCM: 0.6 },
        { dxCM: -0.2, dyCM: -0.7 },
        

      ],

      "[25] Beleuchtung/Ausstattung": [
        { dxCM: 0.4, dyCM:  0.0},

      ],


      // Weichen
      Weichen: [{ dxCM: 0.0, dyCM: 1.0 }],

      // Achszähler
      Achszähler: [
        { dxCM: 0.25, dyCM: 0.05 },
      ],

      // PZB
      PZB: [
        { dxCM: 0.25, dyCM: 0.05 },
        { dxCM: -0.25, dyCM: 0.05 },
      ],
      Sonstiges: [
      ],

      // Default (wenn keine Kategorie bekannt)
      default: [{ dxCM: -0.5, dyCM: 0.0 }],
    };

    // Seitenbereiche entlang eines Hauptgleises (für streckenseitige Objekte)
    const TRACKSIDE_PLACEMENT_ZONES_CM = [
      { from: -0.3, to: -0.1 },
      { from: 0.1, to: 0.3 },
    ];



    // Linienarten in cm (wird später in Pixel umgerechnet)
    // Linienarten in cm (wird später in Pixel umgerechnet) – bestehend:
    const lineTypesCM = {
      hauptgleis: { width: 0.04, color: "black" },
      nebengleis: { width: 0.02, color: "black" },
      linie_nb: { width: 0.02, color: "black" }, // Nb-Grenze: "- · · -"
      linie_stb: { width: 0.02, color: "black" }, // StB-Grenze: "- · -"
      linie_gkt: { width: 0.02, color: "black" },   // Gemeinschaftskabeltrasse
      linie_lstk: { width: 0.02, color: "black" },  // LST-Kabeltrasse
      linie_fmkt: { width: 0.02, color: "black" },  // Fernmeldekabeltrasse
      linie_km: { width: 0.02, color: "black" }, // Kilometrierung: "--"
      linie_pink: { width: 0.12, color: "#ff2fb0" },
      linie_gruen: { width: 0.12, color: "#00c853" },
      linie_grau: { width: 0.12, color: "#9e9e9e" },
      linie_gelb: { width: 0.12, color: "#00c125" },


      // Betriebsgleise (feste Farben, nicht phasenabhängig)
      linie_zugb: { width: 0.04, color: "#ff0000" },
      linie_dispo: { width: 0.04, color: "#ffd400" },
      linie_andi: { width: 0.04, color: "#ff7a00" },
      linie_ab: { width: 0.04, color: "#0033ff" },
      linie_lade: { width: 0.04, color: "#00c853" },
      linie_lade_kv: { width: 0.04, color: "#00bfa5" },
      linie_lok: { width: 0.04, color: "#7b0000" },
      linie_tank: { width: 0.04, color: "#00e5ff" },
      linie_zuf: { width: 0.04, color: "#ff00ff" },
    };



    // Abgeleitete Pixelgrößen
    const hSpacing = hGridSpacingCM * PIXELS_PER_CM;
    const vSpacing = vGridSpacingCM * PIXELS_PER_CM;

    // Raster der geladenen Pixel-Elemente & Definitionen
    const pixelElements = {}; // id -> {img, width, height}
    const elementDefinitions = {}; // id -> original def


    // Upload-Assets (DataURL) für Projekt speichern/laden
    const uploadedAssets = {}; // id -> dataURL
    // Toolbar-Refs
    let toolbar,
      sizeInput,
      colorInput,
      boldBtn,
      italicBtn,
      currentEditingElement = null,
      currentEditor = null,
      isToolbarPointerDown = false;



    let titleBlockImage = null;        // HTMLImageElement oder null
    let titleBlockImageURL = null;     // DataURL für jsPDF.addImage
    // Feinjustage für das PNG-Schriftfeld
    const TB_FINE_OFFSET_MM = { x: -0.5, y: -0.5 };  // 0,1 mm nach links/oben
    const TB_GROW_MM_BY_SIZE = { A2: 1.5, A1: 1.5, A0: 1.5 }; // +2 mm Breite ab A2

    function detectASizeKey(pageWmm, pageHmm) {
      const near = (a, b, t = 2) => Math.abs(a - b) <= t;
      const W = pageWmm, H = pageHmm, L = Math.max(W, H), S = Math.min(W, H);
      if (near(L, 420) && near(S, 297)) return "A3";
      if (near(L, 594) && near(S, 420)) return "A2";
      if (near(L, 841) && near(S, 594)) return "A1";
      if (near(L, 1189) && near(S, 841)) return "A0";
      if (near(L, 297) && near(S, 210)) return "A4"; // nur Vollständigkeit
      return null;
    }

    // Sichtbarkeit: Linien & (Unter-)Kategorien
    const visibility = {
      lineTypes: {
        hauptgleis: true,
        nebengleis: true,
        linie_nb: true,
        linie_stb: true,
        linie_km: true,
        linie_gkt: true,
        linie_lstk: true,
        linie_fmkt: true,
        linie_pink: true,
        linie_gruen: true,
        linie_grau: true,
        linie_gelb: true,

        // Betriebsgleise
        linie_zugb: true,
        linie_dispo: true,
        linie_andi: true,
        linie_ab: true,
        linie_lade: true,
        linie_lade_kv: true,
        linie_lok: true,
        linie_tank: true,
        linie_zuf: true,
      },
      // Keys: "Kategorie" oder "Kategorie|Unterkategorie"
      categories: {}
    };

    function visKey(category, subcategory) {
      return subcategory ? `${category}|${subcategory}` : category;
    }

    // Bau-/Darstellungsmodus für Linien
    const PHASES = { IST: "IST", RUECKBAU: "RUECKBAU", NEUBAU: "NEUBAU" };
    let currentPhase = PHASES.IST;

    // Linienfarben je Modus
    const PHASE_COLORS = {
      [PHASES.IST]: "#000000",   // schwarz
      [PHASES.RUECKBAU]: "#FFC002",   // gelb 
      [PHASES.NEUBAU]: "#FF0606",   // rot
    };

    function getPhaseColor(phase) {
      return PHASE_COLORS[phase || PHASES.IST] || PHASE_COLORS[PHASES.IST];
    }

    const propertiesPanel = document.getElementById("properties-panel");

    const propsBody = document.getElementById("props-body");

    //für getSelectet mode zum initialieiseren

    let propsActiveTab = "fields";
    let selectedElementIndex = null;
    let activeTextElement = null;
    let selectedLineIndex = null;
    const savedLines = [];
    const savedElements = [];
    let customPropTemplates = {};




    // Hilfsfunktionen: aktuelle Auswahl robust holen
    function getSelectedModel() {
      if (selectedElementIndex !== null) {
        const el = savedElements[selectedElementIndex];
        return { kind: "element", el };
      }
      if (selectedLineIndex !== null) {
        const line = savedLines[selectedLineIndex];
        return { kind: "line", line };
      }
      return { kind: "none" };

    }


    function initPropertiesPanelDelegation() {
      if (!propsBody || propsBody.__delegationWired) return;
      propsBody.__delegationWired = true;

      // Tabs (merken + umschalten)
      propsBody.addEventListener("click", (e) => {
        const tabBtn = e.target.closest(".props-tab");
        if (!tabBtn) return;

        const t = tabBtn.dataset.tab;
        if (!t) return;
        propsActiveTab = t;

        const root = propsBody;
        root.querySelectorAll(".props-tab").forEach(b =>
          b.classList.toggle("is-active", b === tabBtn)
        );
        root.querySelectorAll(".props-pane").forEach(p =>
          p.classList.toggle("is-active", p.dataset.pane === t)
        );
      });

      // Element-Felder: Inputs (Label/Value) + Delete via data-action
      propsBody.addEventListener("input", (e) => {
        const t = e.target;
        if (!t?.matches?.("[data-kind][data-idx]")) return;

        const sel = getSelectedModel();
        const model = sel.kind === "element" ? sel.el : sel.kind === "line" ? sel.line : null;
        if (!model) return;

        if (sel.kind === "element") ensureElementProps(model);
        if (sel.kind === "line") ensureLineProps(model);

        const idx = Number(t.dataset.idx);
        if (!Number.isFinite(idx) || !model.propsPanel.fields?.[idx]) return;

        beginPropsHistory();

        const fk = t.dataset.kind;
        if (fk === "label") model.propsPanel.fields[idx].label = t.value;
        if (fk === "value") model.propsPanel.fields[idx].value = t.value;

        // Optional: live redraw (meist nicht nötig)
        // redrawCanvas();
      });

      propsBody.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;

        const action = btn.dataset.action;

        // --- Element-Kontext ---
        const sel = getSelectedModel();

        if (action === "delete-field") {
          const model = sel.kind === "element" ? sel.el : sel.kind === "line" ? sel.line : null;
          if (!model) return;

          const idx = Number(btn.dataset.idx);
          if (!Number.isFinite(idx)) return;

          beginPropsHistory();
          model.propsPanel.fields.splice(idx, 1);
          renderPropertiesForSelection(true);
          commitPropsHistory("delete property field");
          return;
        }

        if (action === "add-field") {
          const model = sel.kind === "element" ? sel.el : sel.kind === "line" ? sel.line : null;
          if (!model) return;

          if (sel.kind === "element") ensureElementProps(model);
          if (sel.kind === "line") ensureLineProps(model);

          beginPropsHistory();
          model.propsPanel.fields.push({
            id: `fld_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            label: "Neues Feld",
            type: "text",
            value: ""
          });
          renderPropertiesForSelection(true);
          commitPropsHistory("add property field");
          return;
        }

        if (action === "reset-template") {
          if (sel.kind !== "element" || !sel.el) return;

          beginPropsHistory();

          const cat = sel.el.propsPanel?.category || getAutoCategoryForElement(sel.el);
          const effective = getEffectiveTemplate(cat);

          // bestehende Werte nach ID merken
          const byId = new Map((sel.el.propsPanel.fields || []).map(f => [f.id, f]));

          // Template-Struktur übernehmen, Werte behalten (wo vorhanden)
          sel.el.propsPanel.fields = effective.map(def => {
            const existing = byId.get(def.id);
            return existing
              ? { ...structuredClone(def), value: existing.value }
              : structuredClone(def);
          });

          renderPropertiesForSelection(true);
          commitPropsHistory("sync property template");
          return;
        }


        // --- Kategorie-Manager ---
        if (action === "create-cat") {
          const nameInput = propsBody.querySelector("#prop-new-cat-name");
          const name = (nameInput?.value || "").trim();
          if (!name) return alert("Bitte einen Kategorienamen eingeben.");
          if (BUILTIN_PROP_TEMPLATES[name]) return alert("Dieser Name ist reserviert (Built-in).");
          if (customPropTemplates[name]) return alert("Kategorie existiert bereits.");

          beginPropsHistory();
          customPropTemplates[name] = deepClone(BUILTIN_PROP_TEMPLATES.default);
          renderPropertiesForSelection(true);
          commitPropsHistory("create property category");
          return;
        }

        if (action === "delete-cat") {
          const manageSel = propsBody.querySelector("#prop-manage-cat");
          const cat = manageSel?.value;
          if (!cat) return alert("Bitte eine eigene Kategorie auswählen.");
          if (!customPropTemplates[cat]) return alert("Kann nur eigene Kategorien löschen.");

          beginPropsHistory();
          delete customPropTemplates[cat];

          savedElements.forEach(el => {
            if (el?.propsPanel?.category === cat) el.propsPanel.category = null;
          });

          renderPropertiesForSelection(true);
          commitPropsHistory("delete property category");
          return;
        }

        if (action === "add-template-field") {
          const manageSel = propsBody.querySelector("#prop-manage-cat");
          const cat = manageSel?.value;
          if (!cat || !customPropTemplates[cat]) return alert("Bitte eine eigene Kategorie auswählen.");

          beginPropsHistory();
          customPropTemplates[cat].push({
            id: `tpl_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            label: "Neues Vorlagenfeld",
            type: "text",
            value: ""
          });
          renderPropertiesForSelection(true);
          commitPropsHistory("add template field");
          return;
        }

        if (action === "delete-template-field") {
          const manageSel = propsBody.querySelector("#prop-manage-cat");
          const cat = manageSel?.value;
          if (!cat || !customPropTemplates[cat]) return;

          const idx = Number(btn.dataset.idx);
          if (!Number.isFinite(idx)) return;

          beginPropsHistory();
          customPropTemplates[cat].splice(idx, 1);
          renderPropertiesForSelection(true);
          commitPropsHistory("delete template field");
          return;
        }
      });

      propsBody.addEventListener("change", (e) => {
        const t = e.target;

        // Element-Kategorie
        if (t?.id === "prop-el-category") {
          const sel = getSelectedModel();
          if (sel.kind !== "element" || !sel.el) return;

          beginPropsHistory();
          sel.el.propsPanel = sel.el.propsPanel || { category: null, fields: [] };
          sel.el.propsPanel.category = t.value;

          // Felder mit Template „auffüllen“ / konsolidieren
          ensureElementProps(sel.el);

          renderPropertiesForSelection(true);
          commitPropsHistory("change property category");
          return;
        }

        if (t?.id === "prop-line-category") {
          const sel = getSelectedModel();
          if (sel.kind !== "line" || !sel.line) return;

          beginPropsHistory();
          sel.line.propsPanel = sel.line.propsPanel || { category: null, fields: [] };
          sel.line.propsPanel.category = t.value === "__auto__" ? null : t.value;

          ensureLineProps(sel.line);

          renderPropertiesForSelection(true);
          commitPropsHistory("change line property category");
          return;
        }

        // Template-Manager: Kategorie wählen
        if (t?.id === "prop-manage-cat") {
          renderTemplateEditor(t.value);
          return;
        }


        // Template-Editor Felder (label/type/value)
        if (t?.matches?.("[data-kind][data-idx]") && t.closest("#prop-template-fields")) {
          const manageSel = propsBody.querySelector("#prop-manage-cat");
          const cat = manageSel?.value;
          if (!cat || !customPropTemplates[cat]) return;

          const idx = Number(t.dataset.idx);
          if (!Number.isFinite(idx) || !customPropTemplates[cat][idx]) return;

          beginPropsHistory();
          const f = customPropTemplates[cat][idx];
          const k = t.dataset.kind;
          if (k === "label") f.label = t.value;
          if (k === "type") f.type = t.value;
          if (k === "value") f.value = t.value;

          renderPropertiesForSelection(true);
          commitPropsHistory("edit template");
          return;
        }
      });

      // Commit: wenn Panel-Fokus verlassen wird
      propsBody.addEventListener("focusout", () => {
        setTimeout(() => commitPropsHistory("edit properties"), 0);
      }, true);

    function getEffectiveTemplateForCategory(catName) {
      const catTpl = getTemplateForCategory(catName);
      return mergeTemplates(GLOBAL_PROP_TEMPLATE, catTpl);
    }

    function getCategoryTemplate(catName) {
      const builtin = BUILTIN_PROP_TEMPLATES[catName] || [];
      const custom = customPropTemplates[catName] || [];
      return [...builtin, ...custom];
    }

    function mergeTemplates(...templates) {
      const byId = new Map();
      for (const tpl of templates) {
        for (const f of tpl) byId.set(f.id, f); // später überschreibt früher
      }
      return Array.from(byId.values());
    }

    function getEffectiveTemplate(catName) {
      return mergeTemplates(
        GLOBAL_PROP_TEMPLATE,
        getCategoryTemplate(catName)
      );
    }

    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

    function getAllPropCategories() {
      const builtIn = Object.keys(BUILTIN_PROP_TEMPLATES);
      const custom = Object.keys(customPropTemplates);
      // default ans Ende (optisch)
      const all = [...new Set([...builtIn, ...custom])];
      all.sort((a, b) => {
        if (a === "default") return 1;
        if (b === "default") return -1;
        return a.localeCompare(b, "de");
      });
      return all;
    }

    function getTemplateForCategory(catName) {
      if (customPropTemplates[catName]) return customPropTemplates[catName];
      if (BUILTIN_PROP_TEMPLATES[catName]) return BUILTIN_PROP_TEMPLATES[catName];
      return BUILTIN_PROP_TEMPLATES.default;
    }

    function getAutoCategoryForLine(line) {
      if (!line) return "Linien";

      const map = {
        hauptgleis: "Hauptgleis",
        nebengleis: "Nebengleis",
        linie_nb: "Nb-Grenze",
        linie_stb: "StB-Grenze",
        linie_km: "Kilometrierung",
        linie_gkt: "Gemeinschaftskabeltrasse",
        linie_lstk: "LST Kabeltrasse",

        linie_pink: "Rangierweg",
        linie_gruen: "Fahrweg",
        linie_grau: "Sonstiger Weg",
        linie_gelb: "Hilfsweg",
        linie_zugb: "Betriebsgleis"
      };

      return map[line.type] || "Linien";
    }

    function getPaletteCategoryLabelForLine(line) {
      return getAutoCategoryForLine(line);
    }

    function ensureLineProps(line) {
      if (!line) return;
      if (!line.propsPanel) line.propsPanel = { category: null, fields: [] };

      const cat = line.propsPanel.category || getAutoCategoryForLine(line);
      line.propsPanel.category = cat;

      const effective = getEffectiveTemplate(cat);
      const existingById = new Map((line.propsPanel.fields || []).map(f => [f.id, f]));

      for (const def of effective) {
        if (!existingById.has(def.id)) {
          line.propsPanel.fields.push(structuredClone(def));
        } else {
          const current = existingById.get(def.id);
          current.label = def.label;
          current.type = def.type;
          if (def.options) current.options = def.options;
          if (def.group) current.group = def.group;
        }
      }
    }



    /** ermittelt Element-Kategorie/Subkategorie (du hast die Funktion schon) */
    function getAutoCategoryForElement(el) {
      const { category, subcategory } = findCategoryAndSubcategoryByElementId(el.id);
      if (subcategory && (customPropTemplates[subcategory] || BUILTIN_PROP_TEMPLATES[subcategory])) return subcategory;
      return category || "default";

     */
    function ensureElementProps(el) {
      if (!el) return;
      if (!el.propsPanel) el.propsPanel = { category: null, fields: [] };

      const cat = el.propsPanel.category || getAutoCategoryForElement(el);


      const effective = getEffectiveTemplate(cat);
      const existingById = new Map((el.propsPanel.fields || []).map(f => [f.id, f]));

      // 1) fehlende Felder hinzufügen (mit Default aus Template)
      for (const def of effective) {
        if (!existingById.has(def.id)) {
          el.propsPanel.fields.push(structuredClone(def)); // oder deepClone(def)
        } else {
          // 2) Optional: Label/Type/Options updaten, Wert behalten
          const current = existingById.get(def.id);
          current.label = def.label;
          current.type = def.type;
          if (def.options) current.options = def.options;
          if (def.group) current.group = def.group;
        }
      }

      // 3) Optional: Felder entfernen, die es in global+cat nicht mehr gibt
      // el.propsPanel.fields = el.propsPanel.fields.filter(f => effective.some(d => d.id === f.id));
    }
    function applyTemplateToAllElementsOfCategory(catName) {
      const effective = getEffectiveTemplate(catName);

      savedElements.forEach(el => {
        const elCat = el?.propsPanel?.category || getAutoCategoryForElement(el);
        if (elCat !== catName) return;

        if (!el.propsPanel) el.propsPanel = { category: elCat, fields: [] };
        if (!Array.isArray(el.propsPanel.fields)) el.propsPanel.fields = [];

        const existing = new Set(el.propsPanel.fields.map(f => f.id));
        effective.forEach(def => {
          if (!existing.has(def.id)) el.propsPanel.fields.push(structuredClone(def));
        });
      });

      saveElementsToStorage();
    }

    function bindTextPanel(el) {
      if (!el || !(el.type === "text" || el.type === "text_box")) return;

      const ta = document.getElementById("prop-text-value");
      const size = document.getElementById("prop-text-size");
      const col = document.getElementById("prop-text-color");
      const bBold = document.getElementById("prop-text-bold");
      const bIt = document.getElementById("prop-text-italic");
      const align = document.getElementById("prop-text-align");
      if (!ta) return;

      ta.value = el.text ?? "";
      if (size) size.value = (el.fontSize ?? 5);
      if (col) col.value = (el.type === "text_box"
        ? (el.textColor || el.color || "#000000")
        : (el.color || "#000000"));
      if (bBold) bBold.classList.toggle("is-active", el.fontWeight === "bold");
      if (bIt) bIt.classList.toggle("is-active", el.fontStyle === "italic");
      if (align) align.value = (el.align || "center");

      let editOpen = false;
      const beginOnce = () => { if (!editOpen) { beginPropsHistory(); editOpen = true; } };
      const commit = (label) => { if (editOpen) { commitPropsHistory(label); editOpen = false; } };

      const redraw = () => redrawCanvas();

      // Rahmen: beim Tippen/Fokus Gruppe als "aktiv" markieren, beim Ende ausschalten
      ta.onfocus = () => {
        if (el.parentId) activeEditingGroupId = el.parentId;
        redraw();
      };
      ta.onkeydown = (e) => {
        if (e.key === "Escape") {
          ta.blur();
        }
      };

      ta.oninput = () => {
        beginOnce();
        el.text = ta.value;
        redraw();
      };
      ta.onblur = () => {
        commit("edit text");
        activeEditingGroupId = null;
        redraw();
      };

      if (size) {
        size.oninput = () => {
          beginOnce();
          const v = parseFloat(size.value);
          if (!Number.isNaN(v)) el.fontSize = v;
          redraw();
        };
        size.onblur = () => commit("edit text style");
      }

      col.onblur = () => commit("edit text color");
      if (col) {
        col.oninput = () => {
          beginOnce();
          if (el.type === "text_box") {
            el.textColor = col.value;
          } else {
            el.color = col.value;
          }
          redraw();
        };
        col.onblur = () => commit("edit text color");
      }

      if (bBold) {
        bBold.onclick = () => {
          beginOnce();
          el.fontWeight = (el.fontWeight === "bold") ? "normal" : "bold";
          bBold.classList.toggle("is-active", el.fontWeight === "bold");
          redraw();
        };
      }

      if (bIt) {
        bIt.onclick = () => {
          beginOnce();
          el.fontStyle = (el.fontStyle === "italic") ? "normal" : "italic";
          bIt.classList.toggle("is-active", el.fontStyle === "italic");
          redraw();
        };
        if (align) {
          align.oninput = () => {
            beginOnce();
            el.align = (align.value || "center");
            redraw();
          };
          align.onblur = () => commit("edit text alignment");
          align.onchange = () => {
            beginOnce();
            el.align = (align.value || "center");
            redraw();
            commit("edit text alignment");
          };
        }
      }
    }

    // --- Pink-Pattern (Checker) für Linie ---
    function makePinkPattern() {
      const tile = 18;         // Kachelgröße in px (größer = ruhigeres Muster)
      const diamond = 10;      // "Quadrat"-Größe (als Raute) in px

      const c = document.createElement("canvas");
      c.width = tile;
      c.height = tile;
      const p = c.getContext("2d");

      p.clearRect(0, 0, tile, tile);
      p.fillStyle = "#ff2fb0";

      function drawDiamond(cx, cy) {
        p.save();
        p.translate(cx, cy);
        p.rotate(Math.PI / 4); // 45° drehen -> Quadrat wird zur Raute
        p.fillRect(-diamond / 2, -diamond / 2, diamond, diamond);
        p.restore();
      }

      // Rauten so platzieren, dass sie sich diagonal an den Ecken berühren:
      // (tile/2, tile/2) und Ecken-Nachbarn in den Kachel-Ecken
      const mid = tile / 2;

      drawDiamond(mid, mid);
      drawDiamond(0, 0);
      drawDiamond(tile, 0);
      drawDiamond(0, tile);
      drawDiamond(tile, tile);

      return ctx.createPattern(c, "repeat");
    }

    function makeCheckerPattern({ cell = 6, rows = 3, cols = 6, color = "#ff2fb0" } = {}) {
      const dpr = window.devicePixelRatio || 1;

      const w = cell * cols;
      const h = cell * rows;

      const c = document.createElement("canvas");
      c.width = Math.round(w * dpr);
      c.height = Math.round(h * dpr);

      const p = c.getContext("2d");
      p.imageSmoothingEnabled = false;
      p.scale(dpr, dpr);

      // WICHTIG: Hintergrund weiß, nicht transparent!
      p.fillStyle = "#ffffff";
      p.fillRect(0, 0, w, h);

      // echtes Schachbrett (abwechselnd)
      p.fillStyle = color;
      for (let r = 0; r < rows; r++) {
        for (let col = 0; col < cols; col++) {
          if ((r + col) % 2 === 0) {
            p.fillRect(col * cell, r * cell, cell, cell);
          }
        }
      }

      return ctx.createPattern(c, "repeat");
    }

    // Data-URI -> bereinigter <svg>-Knoten (ohne <text>/<tspan>), mit viewBox
    // Ein Loader, der sowohl data:SVG als auch .svg-URLs lädt
    async function loadSvgElementFromSrc(src) {
      let svgText = "";

      if (src.startsWith("data:image/svg+xml")) {
        const commaIdx = src.indexOf(",");
        const meta = src.slice(0, commaIdx);
        const payload = src.slice(commaIdx + 1);

        if (/;base64/i.test(meta)) {
          const bin = atob(payload);
          svgText = decodeURIComponent(
            Array.prototype.map.call(bin, c =>
              "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)
            ).join("")
          );
        } else {
          svgText = decodeURIComponent(payload);
        }
      } else if (/\.svg(\?|$)/i.test(src) || /^https?:\/\//i.test(src)) {
        const res = await fetch(src, { cache: "no-cache" });
        if (!res.ok) throw new Error(`SVG konnte nicht geladen werden: ${src}`);
        svgText = await res.text();
      } else {
        return null;
      }

      const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
      const svg = doc.documentElement;
      if (!svg || svg.nodeName.toLowerCase() === "parsererror") return null;

      svg.querySelectorAll("[style]").forEach(node => {
        const s = node.getAttribute("style");
        if (!s) return;
        s.split(";").forEach(part => {
          const [prop, val] = part.split(":").map(t => t.trim());
          if (prop && val) node.setAttribute(prop, val);
        });
        node.removeAttribute("style");
      });

      svg.querySelectorAll("script").forEach(n => n.remove());

      if (!svg.getAttribute("xmlns")) {
        svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      }

      if (!svg.getAttribute("viewBox")) {
        const w = parseFloat(svg.getAttribute("width")) || 100;
        const h = parseFloat(svg.getAttribute("height")) || 100;
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
      }

      if (!svg.getAttribute("width") || !svg.getAttribute("height")) {
        const vb = (svg.getAttribute("viewBox") || "").trim().split(/\s+/).map(Number);
        if (vb.length === 4 && Number.isFinite(vb[2]) && Number.isFinite(vb[3])) {
          if (!svg.getAttribute("width")) svg.setAttribute("width", String(vb[2]));
          if (!svg.getAttribute("height")) svg.setAttribute("height", String(vb[3]));
        }
      }

      return svg;
    }

    const libraryAssetDataUrlCache = new Map();

    async function srcToDataUrl(src) {
      if (!src) throw new Error("Leere Asset-Quelle");
      if (/^data:/i.test(src)) return src;
      if (libraryAssetDataUrlCache.has(src)) return libraryAssetDataUrlCache.get(src);

      const res = await fetch(src);
      if (!res.ok) throw new Error(`Asset konnte nicht geladen werden: ${src}`);
      const blob = await res.blob();

      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error || new Error("FileReader fehlgeschlagen"));
        reader.readAsDataURL(blob);
      });

      libraryAssetDataUrlCache.set(src, dataUrl);
      return dataUrl;
    }

    async function loadImageFromDataUrl(dataUrl) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = (e) => reject(e || new Error("Bild aus Data-URL konnte nicht geladen werden"));
        img.src = dataUrl;
      });
    }

    async function ensureLibraryAssetsEmbedded() {
      if (libraryAssetsEmbeddedPromise) return libraryAssetsEmbeddedPromise;

      libraryAssetsEmbeddedPromise = (async () => {
        const failed = [];

        for (const id in pixelElements) {
          const def = elementDefinitions[id];
          if (!def || def._uploadedAsset || def.type !== "image") continue;

          const pe = pixelElements[id];
          if (!pe || !pe.imgsByPhase) continue;

          for (const phaseKey of Object.keys(pe.imgsByPhase)) {
            const phData = pe.imgsByPhase[phaseKey];
            if (!phData || !phData.src || /^data:/i.test(phData.src)) continue;

            const originalSrc = phData.originalSrc || phData.src;
            try {
              const dataUrl = await srcToDataUrl(originalSrc);
              const img = await loadImageFromDataUrl(dataUrl);
              phData.originalSrc = originalSrc;
              phData.src = dataUrl;
              phData.img = img;
            } catch (err) {
              failed.push({ id, phaseKey, src: originalSrc, err });
              phData.originalSrc = originalSrc;
              // Originalzustand beibehalten, damit vorhandene Assets trotzdem weiter nutzbar bleiben.
              console.warn(`Bibliotheksbild übersprungen: ${id} / ${phaseKey} / ${originalSrc}`, err);
            }
          }
        }

        return { failed };
      })().catch(err => {
        libraryAssetsEmbeddedPromise = null;
        throw err;
      });

      return libraryAssetsEmbeddedPromise;
    }

    // aus einem Element-Def (src / srcByPhase) eine Map je Phase bauen
    function buildPhaseSrcMap(el) {
      const map = {};

      // explizite Zuordnung
      const phaseMap = el.phaseSrc || el.srcByPhase;
      if (phaseMap) {
        map[PHASES.IST] = phaseMap.IST || el.src;
        map[PHASES.RUECKBAU] = phaseMap.RUECKBAU || el.src;
        map[PHASES.NEUBAU] = phaseMap.NEUBAU || el.src;
        return map;
      }

      // Fallback: Dateiname ableiten (_rueckbau / _neubau)
      const baseSrc = el.src || "";
      const dot = baseSrc.lastIndexOf(".");
      if (dot === -1) {
        map[PHASES.IST] = baseSrc;
        map[PHASES.RUECKBAU] = baseSrc;
        map[PHASES.NEUBAU] = baseSrc;
      } else {
        const base = baseSrc.slice(0, dot);
        const ext = baseSrc.slice(dot);
        map[PHASES.IST] = baseSrc;
        map[PHASES.RUECKBAU] = `${base}_rueckbau${ext}`;
        map[PHASES.NEUBAU] = `${base}_neubau${ext}`;
      }
      return map;
    }


    // Bilddaten (inkl. Breite/Höhe) für eine ID + Phase holen
    function getImageDataForId(elementId, phase) {
      const pe = pixelElements[elementId];
      if (!pe) return null;
      const phData =
        (pe.imgsByPhase && pe.imgsByPhase[phase]) ||
        (pe.imgsByPhase && pe.imgsByPhase[PHASES.IST]);
      if (!phData) return null;
      return { img: phData.img, width: pe.width, height: pe.height, src: phData.src };
    }

    // Für ein konkretes gespeichertes Element (hat .id und .phase)
    function getImageDataForElement(el) {
      return getImageDataForId(el.id, el.phase || PHASES.IST);
    }

    // Nur die URL (für Palette etc.)
    function getPhaseImageSrcForElementId(id, phase) {
      const d = getImageDataForId(id, phase || PHASES.IST);
      if (d && d.src) return d.src;
      const def = elementDefinitions[id];
      return def && def.src ? def.src : "";
    }

    // Palette umschalten, wenn Modus gewechselt wird
    function updatePaletteIconsForPhase() {
      if (!controlsContainer) return;
      controlsContainer
        .querySelectorAll("img[data-element-id]")
        .forEach(img => {
          const id = img.dataset.elementId;
          const def = elementDefinitions[id];
          if (!def || def.type !== "image") return;
          const src = getPhaseImageSrcForElementId(id, currentPhase);
          if (src) img.src = src;
        });
    }


    function processElements(categoryObject) {
      for (const id in categoryObject) {
        const el = categoryObject[id];

        // Definition merken (inkl. edgeSide für Plattformen)
        elementDefinitions[id] = {
          ...el,
          edgeSide: el.edgeSide || (el.doubleSided ? "both" : "bottom")
        };

        if (el.type === "image") {
          const width = el.widthCM * PIXELS_PER_CM;
          const height = el.heightCM * PIXELS_PER_CM;

          const srcByPhase = buildPhaseSrcMap(el);
          const imgsByPhase = {};

          for (const phaseKey of Object.values(PHASES)) {
            const src = srcByPhase[phaseKey];
            if (!src) continue;
            imgsByPhase[phaseKey] = {
              src,
              img: makeImage(src)
            };
          }

          pixelElements[id] = {
            width,
            height,
            imgsByPhase
          };
        }

        if (el.type === "platform") {
          const edgeSide = el.edgeSide || (el.doubleSided ? "both" : "bottom");
          pixelElements[id] = {
            width: (el.widthCM || 4) * PIXELS_PER_CM,
            height: (el.heightCM || 1.2) * PIXELS_PER_CM,
            gapPx: (el.gapCM || 0.18) * PIXELS_PER_CM,
            edgeSide
          };
        }
      }
    }

    // Sichtbarkeit für alle Kategorien/Subkategorien standardmäßig AN
    for (const catName in ELEMENT_CATEGORIES) {
      const cat = ELEMENT_CATEGORIES[catName];
      if (cat.type === "nested") {
        visibility.categories[visKey(catName, null)] = true; // Gesamtkategorie
        for (const subName in cat.subcategories) {
          visibility.categories[visKey(catName, subName)] = true;
        }
      } else {
        visibility.categories[visKey(catName, null)] = true;
      }
    }

    // Katalog vorbereiten (inkl. verschachtelte Kategorien)
    for (const categoryName in ELEMENT_CATEGORIES) {
      const categoryData = ELEMENT_CATEGORIES[categoryName];
      if (categoryData.type === "nested") {
        for (const subcategoryName in categoryData.subcategories) {
          processElements(categoryData.subcategories[subcategoryName]);
        }
      } else {
        processElements(categoryData);
      }
    }

    function isSwitch(elementId) {
      return elementId && elementId.startsWith("weiche_");
    }

    function screenToWorld(screenX, screenY) {
      const rect = canvas.getBoundingClientRect();
      const relativeX = screenX - rect.left;
      const relativeY = screenY - rect.top;
      return {
        x: (relativeX - origin.x) / scale,
        y: (relativeY - origin.y) / scale,
      };
    }

    function worldToScreen(worldX, worldY) {
      return { x: worldX * scale + origin.x, y: worldY * scale + origin.y };
    }

    function getSnapPoint(worldX, worldY) {
      const snappedX = Math.round(worldX / hSpacing) * hSpacing;
      const snappedY = Math.round(worldY / vSpacing) * vSpacing;
      return { x: snappedX, y: snappedY };
    }

    function getVerticalSnap(x) {
      const spacing = hSpacing / 3;
      return Math.round(x / spacing) * spacing;
    }

    function getGridSnapY(worldY, elementHeight) {
      const elementCenter = worldY + elementHeight / 2;
      const snappedCellCenter =
        Math.round((elementCenter - vSpacing / 2) / vSpacing) * vSpacing +
        vSpacing / 2;
      return snappedCellCenter - elementHeight / 2;
    }

    function getClosestSnapY(worldY) {
      const mainLineAbove = Math.floor(worldY / vSpacing) * vSpacing;
      const mainLineBelow = mainLineAbove + vSpacing;

      const potentialSnapYs = [mainLineAbove, mainLineBelow];

      [mainLineAbove, mainLineBelow].forEach((mainY) => {
        TRACKSIDE_PLACEMENT_ZONES_CM.forEach((zone) => {
          potentialSnapYs.push(mainY + zone.from * PIXELS_PER_CM);
          potentialSnapYs.push(mainY + zone.to * PIXELS_PER_CM);
        });
      });

      let closestY = Infinity;
      let minDistance = Infinity;
      potentialSnapYs.forEach((snapY) => {
        const dist = Math.abs(worldY - snapY);
        if (dist < minDistance) {
          minDistance = dist;
          closestY = snapY;
        }
      });
      return closestY;
    }

    function getDistanceToLineSegment(p, v, w) {
      const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
      if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
      let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
      t = Math.max(0, Math.min(1, t));
      const closestPoint = {
        x: v.x + t * (w.x - v.x),
        y: v.y + t * (w.y - v.y),
      };
      return Math.hypot(p.x - closestPoint.x, p.y - closestPoint.y);
    }

    /* =========================
     *   Zeichnen
     * ========================= */
    function drawGrid() {
      ctx.strokeStyle = "#e0e0e0";
      ctx.lineWidth = 1 / scale;
      const view = {
        x1: -origin.x / scale,
        y1: -origin.y / scale,
        x2: (canvas.width - origin.x) / scale,
        y2: (canvas.height - origin.y) / scale,
      };
      const startX = Math.floor(view.x1 / hSpacing) * hSpacing;
      const startY = Math.floor(view.y1 / vSpacing) * vSpacing;
      for (let x = startX; x < view.x2; x += hSpacing) {
        ctx.beginPath();
        ctx.moveTo(x, view.y1);
        ctx.lineTo(x, view.y2);
        ctx.stroke();
      }
      for (let y = startY; y < view.y2; y += vSpacing) {
        ctx.beginPath();
        ctx.moveTo(view.x1, y);
        ctx.lineTo(view.x2, y);
        ctx.stroke();
      }
    }

    function drawHelperLines() {
      ctx.strokeStyle = "rgba(0, 150, 255, 0.5)";
      ctx.lineWidth = 1 / scale;
      ctx.setLineDash([3 / scale, 3 / scale]);
      const view = {
        x1: -origin.x / scale,
        y1: -origin.y / scale,
        x2: (canvas.width - origin.x) / scale,
        y2: (canvas.height - origin.y) / scale,
      };
      const startY = Math.floor(view.y1 / vSpacing) * vSpacing;
      for (let y = startY; y < view.y2; y += vSpacing) {
        TRACKSIDE_PLACEMENT_ZONES_CM.forEach((zone) => {
          const y1 = y + zone.from * PIXELS_PER_CM;
          const y2 = y + zone.to * PIXELS_PER_CM;
          ctx.beginPath();
          ctx.moveTo(view.x1, y1);
          ctx.lineTo(view.x2, y1);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(view.x1, y2);
          ctx.lineTo(view.x2, y2);
          ctx.stroke();
        });
      }
      ctx.setLineDash([]);
    }


    function drawExportFrame() {
      const paper = currentPaperSize;
      if (!paper) return;

      // mm → px
      const mmToPx = (mm) => (mm / 10) * PIXELS_PER_CM;

      const marginMM = 10;       // umlaufender Rand
      const extraLeftMM = 10;    // zusätzlicher linker Rand (wie in drawISOFrame)

      const leftPx = mmToPx(marginMM + extraLeftMM);
      const topPx = mmToPx(marginMM);
      const wPx = mmToPx(paper.width - (2 * marginMM + extraLeftMM));
      const hPx = mmToPx(paper.height - 2 * marginMM);

      ctx.save();
      ctx.strokeStyle = "rgba(120, 0, 255, 0.6)";   // dein lilablau
      ctx.lineWidth = 2 / scale;
      ctx.setLineDash([8 / scale, 4 / scale]);

      // optional: 0.5-Alignment für knackige 1px-Linien
      const half = 0.5 / scale;
      ctx.strokeRect(leftPx + half, topPx + half, wPx, hPx);

      ctx.restore();
    }


    // mm -> Canvas-Pixel (dein Canvas arbeitet mit cm * PIXELS_PER_CM)
    function mmToPx(mm) {
      return (mm / 10) * PIXELS_PER_CM;
    }

    // Liefert das Titelblock-Rechteck unten rechts in Canvas-Weltpixeln
    function getTitleBlockRectPx(paper /* {width,height} in mm */) {
      // identisch zur PDF-Logik
      const margin = 10;      // mm
      const targetW = 180;    // mm (typische Breite ISO 7200 Block)
      const targetH = 55;     // mm (typische Höhe ISO 7200 Block)

      const maxW = Math.max(60, paper.width - 2 * margin);
      const maxH = Math.max(30, paper.height - 2 * margin);
      const scale = Math.min(1, maxW / targetW, maxH / targetH);

      const wmm = targetW * scale;
      const hmm = targetH * scale;

      const xmm = paper.width - margin - wmm;
      const ymm = paper.height - margin - hmm;

      return {
        x: mmToPx(xmm),
        y: mmToPx(ymm),
        w: mmToPx(wmm),
        h: mmToPx(hmm),
      };
    }
    function getTitleBlockRectMM(page /* {width,height} in mm */) {
      const margin = 10;   // mm
      const targetW = 180; // mm (deine ISO-7200-Logik)
      const targetH = 55;  // mm

      const maxW = Math.max(60, page.width - 2 * margin);
      const maxH = Math.max(30, page.height - 2 * margin);
      const scale = Math.min(1, maxW / targetW, maxH / targetH);

      const w = targetW * scale;
      const h = targetH * scale;
      const x = page.width - margin - w;  // unten rechts
      const y = page.height - margin - h;
      return { x, y, w, h };
    }


    function drawCenteredMultilineText(ctx, text, x, y, width, height, fontSize, color, align = "center") {
      if (!text) return;

      const safeAlign = (align === "left" || align === "right" || align === "center") ? align : "center";

      ctx.fillStyle = color || "#000";
      ctx.textAlign = safeAlign;
      ctx.textBaseline = "middle";

      const lines = text.toString().split("\n");
      const lineHeight = fontSize * 1.2;
      const totalHeight = lines.length * lineHeight;
      const startY = y + height / 2 - totalHeight / 2 + lineHeight / 2;

      const padding = 2;
      let textX = x + width / 2;
      if (safeAlign === "left") textX = x + padding;
      if (safeAlign === "right") textX = x + width - padding;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        ctx.fillText(line, textX, startY + i * lineHeight);
      }
    }


    function drawLine(from, to, props, context = ctx) {
      context.save();
      context.beginPath();
      context.moveTo(from.x, from.y);
      context.lineTo(to.x, to.y);

      context.imageSmoothingEnabled = false;

      const cap = props.lineCap || "round";
      const join = props.lineJoin || "round";

      if (props.outline?.color && props.outline?.thickness) {
        context.save();
        context.strokeStyle = props.outline.color;
        context.lineWidth = props.width + 2 * props.outline.thickness;
        context.lineCap = cap;
        context.lineJoin = join;
        context.setLineDash([]);
        context.stroke();
        context.restore();
      }

      context.strokeStyle = props.pattern || props.color;
      context.lineWidth = props.width;
      context.lineCap = cap;
      context.lineJoin = join;
      context.setLineDash(props.dash?.length ? props.dash : []);
      context.stroke();

      context.restore();
    }




    function redrawCanvas(showGrid = true) {
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(origin.x, origin.y);
      ctx.scale(scale, scale);

      // 🔹 Raster nur zeichnen, wenn gewünscht
      if (showGrid) {
        drawGrid();
      }

      // Hilfslinien und Vorschauen wie gehabt
      const isDraggingExistingTrackside =
        isDragging &&
        selectedElementIndex !== null &&
        elementDefinitions[savedElements[selectedElementIndex]?.id]?.placement === "trackside";

      const isDraggingText =
        isDragging &&
        selectedElementIndex !== null &&
        savedElements[selectedElementIndex]?.type === "text";

      const isDraggingRegularElement =
        isDragging &&
        selectedElementIndex !== null &&
        !isSwitch(savedElements[selectedElementIndex]?.id) &&
        !isDraggingExistingTrackside;

      const isDraggingNewRegularElement =
        draggedElementData &&
        !isSwitch(draggedElementData.id) &&
        !draggedElementData.trackside;

      if (
        isDraggingExistingTrackside ||
        isDraggingNewTracksideElement ||
        isResizing ||
        isDraggingText ||
        tracksideSnapIndicator ||
        isDraggingRegularElement ||
        isDraggingNewRegularElement
      ) {
        drawHelperLines();
      }

      if (previewElement) {
        ctx.fillStyle = "rgba(150, 150, 150, 0.5)";
        ctx.fillRect(
          previewElement.x,
          previewElement.y,
          previewElement.width,
          previewElement.height
        );
      }

      if (tracksideSnapIndicator) {
        ctx.fillStyle = "rgba(150, 150, 150, 0.5)";
        ctx.fillRect(
          tracksideSnapIndicator.x,
          tracksideSnapIndicator.y,
          tracksideSnapIndicator.width,
          tracksideSnapIndicator.height
        );
      }



      // 🔹 Zeichne alles (Linien, Bilder, Text usw.)
      drawAllElementsAndLines();

      // Vorschau-Linie (während Zeichnen)
      if (previewLine) {
        const previewProps = { ...lineTypes[currentLineType], color: "#9e9e9e" };
        drawLine(previewLine.start, previewLine.end, previewProps);
      }

      // 🔹 Rahmen für Exportbereich anzeigen
      if (showExportFrame) {
        drawExportFrame();
      }
      // --- Schriftfeld (PNG) im Canvas anzeigen ---
      if (currentPaperSize) {
        const tb = getTitleBlockRectPx(currentPaperSize); // mm->px
        if (titleBlockImage) {
          const tb = getTitleBlockRectPx(currentPaperSize); // mm->px
          const key = detectASizeKey(currentPaperSize.width, currentPaperSize.height);
          const growWmm = (key && TB_GROW_MM_BY_SIZE[key]) ? TB_GROW_MM_BY_SIZE[key] : 0;

          // mm→px für Korrekturen
          const growWpx = mmToPx(growWmm);
          const offXpx = mmToPx(TB_FINE_OFFSET_MM.x);
          const offYpx = mmToPx(TB_FINE_OFFSET_MM.y);

          const ratio = titleBlockImage.height / titleBlockImage.width;
          const imgW = tb.w + growWpx;     // +2mm ab A2
          const imgH = imgW * ratio;
          const x = tb.x - growWpx + offXpx;         // rechts bündig + Feinversatz
          const y = tb.y + (tb.h - imgH) + offYpx;   // unten bündig + Feinversatz

          ctx.drawImage(titleBlockImage, x, y, imgW, imgH);
        } else if (titleBlockEnabled) {
          // deine bestehende gestrichelte Vorschau
          ctx.save();
          ctx.strokeStyle = "rgba(255, 140, 0, 0.9)";
          ctx.lineWidth = 2 / scale;
          ctx.setLineDash([8 / scale, 4 / scale]);
          ctx.strokeRect(tb.x, tb.y, tb.w, tb.h);
          ctx.restore();
        }
      }

      // --- Schriftfeld-Rahmen im Canvas (nur Visualisierung) ---
      if (titleBlockEnabled && currentPaperSize) {
        const tb = getTitleBlockRectPx(currentPaperSize); // mm->px
        ctx.save();
        ctx.strokeStyle = "rgba(255, 140, 0, 0.9)"; // orange
        ctx.lineWidth = 2 / scale;
        ctx.setLineDash([8 / scale, 4 / scale]);
        ctx.strokeRect(tb.x, tb.y, tb.w, tb.h);
        ctx.restore();
      }
      // --- Rahmen für aktive Gruppe ---
      if (activeGroupId) {
        const bounds = getGroupBounds(activeGroupId);
        if (bounds) {
          ctx.save();
          ctx.strokeStyle = "rgba(0, 0, 200, 0.8)";
          ctx.lineWidth = 2 / scale;
          ctx.setLineDash([6 / scale, 3 / scale]);
          ctx.strokeRect(bounds.x, bounds.y, bounds.w, bounds.h);
          ctx.restore();
        }
      }

      // --- Rechteck beim Gruppieren (GRUPPE +) ---
      if (groupMode === "add" && groupSelectionRect) {
        const r = normalizeRect(groupSelectionRect);
        ctx.save();
        ctx.strokeStyle = "rgba(0, 0, 0, 0.7)";
        ctx.lineWidth = 1 / scale;
        ctx.setLineDash([4 / scale, 2 / scale]);
        ctx.strokeRect(r.x, r.y, r.w, r.h);
        ctx.restore();
      }


      ctx.restore();
    }

    /* ===============================================
     *  Hilfsfunktion: zeichnet alle Elemente + Linien
     * =============================================== */
    /* ===============================================
     *  Zeichnet alle Linien, Bilder und Textobjekte
     *  → funktioniert jetzt mit beliebigem Canvas-Kontext
     * =============================================== */
    function drawAllElementsAndLines(context = ctx) {
      // Linien
      // Linien
      savedLines.forEach((line, index) => {
        if (!isLineVisible(line)) return;

        const base = lineTypes[line.type] || lineTypes.hauptgleis;
        const isSelected = index === selectedLineIndex;

        // Phase dieser Linie (Fallback auf IST)
        const phaseKey = line.phase || PHASES.IST;
        const phaseColor = PHASE_COLORS[phaseKey] || PHASE_COLORS[PHASES.IST];

        // Wenn Linientyp eine feste Farbe/Pattern will → nicht nach Phase färben
        const normalColor = base.fixedColor ? (base.color || "#000") : phaseColor;

        const drawColor = isSelected ? "#3f51b5" : normalColor;

        drawLine(
          line.start,
          line.end,
          { ...base, width: base.width * (isSelected ? 1.5 : 1), color: drawColor },
          context
        );

      });




      savedElements.forEach((element, index) => {
        if (!isElementVisible(element)) return;        // ← NEU: unsichtbare Elemente & zugehörige Texte nicht zeichnen
        const isSelected = index === selectedElementIndex;

        if (element.type === "image") {
          const elData = getImageDataForElement(element);
          if (elData && elData.img && elData.img.complete) {
            const w = element.width ?? elData.width;
            const h = element.height ?? elData.height;

            const centerX = element.x + w / 2;
            const centerY = element.y + h / 2;
            context.save();
            context.translate(centerX, centerY);
            context.rotate(((element.rotation || 0) * Math.PI) / 180);
            context.drawImage(
              elData.img,
              -w / 2,
              -h / 2,
              w,
              h
            );
            if (isSelected) {
              context.strokeStyle = "#3f51b5";
              context.lineWidth = 2 / scale;
              context.strokeRect(-w / 2, -h / 2, w, h);

              const def = elementDefinitions[element.id];
              const isUploadedImage = !!def?._uploadedAsset;

              if (isUploadedImage) {
                const hs = 8 / scale;
                context.fillStyle = "#3f51b5";
                context.fillRect(-w / 2, -h / 2, hs, hs);
                context.fillRect(w / 2 - hs, -h / 2, hs, hs);
                context.fillRect(-w / 2, h / 2 - hs, hs, hs);
                context.fillRect(w / 2 - hs, h / 2 - hs, hs, hs);
              }
            }
            context.restore();
          }
          return;
        }

        if (element.type === "text") {
          const phaseColor = getPhaseColor(element.phase);
          const textColor = element.color || phaseColor;

          const w = element.width ?? 120;     // Fallback
          const h = element.height ?? 30;     // Fallback
          const fontPx = element.fontSize || 6;

          context.save();
          context.translate(element.x, element.y);
          context.rotate(((element.rotation || 0) * Math.PI) / 180);

          context.font = `${element.fontStyle || "normal"} ${element.fontWeight || "normal"} ${fontPx}px sans-serif`;
          context.fillStyle = textColor;
          context.textBaseline = "top";

          // ✅ Multiline (split("\n"))
          drawCenteredMultilineText(
            context,
            element.text || "",
            0, 0, w, h,
            fontPx,
            textColor,
            element.align || "center"
          );

          // Rahmenlogik
          let strokeStyle = "transparent";
          context.setLineDash([]);
          if (element.parentId && element.parentId === activeEditingGroupId) {
            strokeStyle = "red";
          } else if (isSelected) {
            strokeStyle = "#3f51b5";
          } else if ((!element.parentId || (element.text || "").trim() === "") && !isSelected) {
            strokeStyle = "rgba(120, 120, 120, 0.6)";
            context.setLineDash([4 / scale, 2 / scale]);
          }

          if (strokeStyle !== "transparent") {
            context.strokeStyle = strokeStyle;
            context.lineWidth = 1 / scale;
            context.strokeRect(0, 0, w, h);
            context.setLineDash([]);
          }

          if (isSelected) {
            context.fillStyle = "#3f51b5";
            const handleSize = 8 / scale;
            context.fillRect(w - handleSize, h - handleSize, handleSize, handleSize);
          }

          context.restore();
          return;
        }
        if (element.type === "platform") {
          const pdata = pixelElements[element.id];
          if (!pdata) return;

          const phaseColor = getPhaseColor(element.phase);
          const w = element.width ?? pdata.width;
          const h = element.height ?? pdata.height;
          const gap = pdata.gapPx;
          const side = pdata.edgeSide || "bottom";

          context.save();
          context.translate(element.x, element.y);
          context.rotate(((element.rotation || 0) * Math.PI) / 180);

          // Außenkontur
          context.lineWidth = 1 / scale;
          context.strokeStyle = phaseColor;
          context.strokeRect(0, 0, w, h);

          // Kantenstreifen (Abstand bleibt konstant über pdata.gapPx)
          context.strokeStyle = phaseColor;
          if (side === "bottom" || side === "both") {
            context.strokeRect(0, h - gap, w, gap);
          }
          if (side === "top" || side === "both") {
            context.strokeRect(0, 0, w, gap);
          }

          if (isSelected) {
            context.strokeStyle = "#3f51b5";
            context.lineWidth = 2 / scale;
            context.strokeRect(0, 0, w, h);

            const hs = 8 / scale;
            context.fillStyle = "#3f51b5";
            context.fillRect(-hs / 2, -hs / 2, hs, hs);
            context.fillRect(w - hs / 2, -hs / 2, hs, hs);
            context.fillRect(-hs / 2, h - hs / 2, hs, hs);
            context.fillRect(w - hs / 2, h - hs / 2, hs, hs);
          }

          context.restore();
          return;
        } if (element.type === "text_box") {
          const phaseColor = getPhaseColor(element.phase);
          const isSelected = index === selectedElementIndex;
          const w = element.width;
          const h = element.height;

          const fillColor = element.fillColor || "#FFFFFF";
          const borderColor = element.borderColor || phaseColor;
          const textColor = element.textColor || element.color || phaseColor;

          context.save();
          context.translate(element.x, element.y);
          context.rotate(((element.rotation || 0) * Math.PI) / 180);

          // Füllung
          context.fillStyle = fillColor;
          context.fillRect(0, 0, w, h);

          // Rahmen
          context.lineWidth = 1 / scale;
          context.strokeStyle = borderColor;
          context.strokeRect(0, 0, w, h);

          // Text
          const fontPx = element.fontSize || 6;
          context.font = `${element.fontStyle || "normal"} ${element.fontWeight || "normal"} ${fontPx}px sans-serif`;
          drawCenteredMultilineText(
            context,
            element.text || "",
            0, 0, w, h,
            fontPx,
            textColor,
            element.align || "center"
          );

          // Auswahlrahmen + Handle
          if (isSelected) {
            context.strokeStyle = "#3f51b5";
            context.lineWidth = 2 / scale;
            context.strokeRect(0, 0, w, h);

            const hs = 8 / scale;
            context.fillStyle = "#3f51b5";
            context.fillRect(w - hs, h - hs, hs, hs);
          }

          context.restore();
          return;
        }



      });
    }

    function getTracksideSnapPosition(worldPoint, el) {
      const finalX = getSnapPoint(worldPoint.x, worldPoint.y).x;
      const finalY = getClosestSnapY(worldPoint.y - el.height / 2);
      return { x: finalX, y: finalY };
    }

    function getTracksideSnapIndicator(worldPoint, el) {
      if (!el) return null;
      const finalPos = getTracksideSnapPosition(worldPoint, el);
      return {
        x: finalPos.x,
        y: finalPos.y,
        width: el.width,
        height: el.height,
      };
    }
    function findCategoryAndSubcategoryByElementId(elementId) {
      for (const catName in ELEMENT_CATEGORIES) {
        const cat = ELEMENT_CATEGORIES[catName];
        if (cat.type === "nested") {
          for (const subName in cat.subcategories) {
            if (elementId in cat.subcategories[subName]) {
              return { category: catName, subcategory: subName };
            }
          }
        } else {
          if (elementId in cat) {
            return { category: catName, subcategory: null };
          }
        }
      }
      return { category: "default", subcategory: null };
    }

    function getPaletteCategoryLabelForElement(el) {
      const { category, subcategory } = findCategoryAndSubcategoryByElementId(el.id);
      const cleanCategory = (category || "default").replace(/^\[\d+\]\s*/, "").trim();

      if (subcategory) return `${cleanCategory} → ${subcategory}`;
      return cleanCategory;
    }



    function isLineVisible(line) {
      return visibility.lineTypes[line.type] !== false;
    }

    function isCategoryVisibleByElementId(elementId) {
      const { category, subcategory } = findCategoryAndSubcategoryByElementId(elementId);
      const subKey = visKey(category, subcategory);
      if (Object.prototype.hasOwnProperty.call(visibility.categories, subKey)) {
        return visibility.categories[subKey];
      }
      if (Object.prototype.hasOwnProperty.call(visibility.categories, category)) {
        return visibility.categories[category];
      }
      return true;
    }

    /** Sichtbarkeit für Canvas/PDF:
     * - Text, der zu einem Element gehört → Sichtbarkeit der Mutter
     * - Freie Texte/Plattformen/Bilder → Sichtbarkeit über eigene ID
     */
    function isElementVisible(el) {
      // Textfeld, das an ein Element "hängt" → Mutterkategorie
      if (el.parentId) {
        const parent = savedElements.find(e => e.uid === el.parentId);
        if (parent && parent.id) return isCategoryVisibleByElementId(parent.id);
      }
      // Textboxen und freie Texte haben ebenfalls eine id (Palette)
      if (el.id) return isCategoryVisibleByElementId(el.id);
      return true;
    }


    function ensureLabelsForElement(el) {
      // Prüfen, ob schon Textfelder existieren
      const existing = savedElements.filter(
        (c) => c.parentId === el.uid && c.type === "text"
      );
      if (existing.length > 0) return;

      // Kategorie + Unterkategorie ermitteln
      const { category, subcategory } = findCategoryAndSubcategoryByElementId(el.id);

      // Positionslogik: Unterkategorie > Kategorie > default
      const labelPositions =
        LABEL_POSITIONS[subcategory] ||
        LABEL_POSITIONS[category] ||
        LABEL_POSITIONS.default;

      if (!labelPositions) return;

      const elData = pixelElements[el.id];
      const centerX = el.x + (elData?.width || 0) / 2;
      const centerY = el.y + (elData?.height || 0) / 2;

      labelPositions.forEach((pos, idx) => {
        const width = DEFAULT_TEXT_SETTINGS.widthCM * PIXELS_PER_CM * 2;
        const height = DEFAULT_TEXT_SETTINGS.heightCM * PIXELS_PER_CM * 2;

        savedElements.push({
          type: "text",
          id: `textfield_${(subcategory || category).toLowerCase()}_${idx}`,
          parentId: el.uid,
          text: "",
          x: centerX + pos.dxCM * PIXELS_PER_CM - width / 2,
          y: centerY + pos.dyCM * PIXELS_PER_CM - height / 2,
          width,
          height,
          rotation: 0,
          phase: (el.phase || currentPhase),
          ...DEFAULT_TEXT_SETTINGS,
          color: getPhaseColor(el.phase || currentPhase),
        });
      });
    }

              c.dataset.elementId = id;

              const pctx = c.getContext("2d");
              pctx.lineWidth = 1;
              pctx.strokeStyle = "#222";
              pctx.strokeRect(2, 4, 76, 32);

              const gap = 4;
              pctx.strokeStyle = "#000";
              let side = "bottom";
              if (def.doubleSided) side = "both";
              if (def.edgeSide) side = def.edgeSide;
              if (id.toLowerCase().includes("top")) side = "top";
              if (side === "both") {
                pctx.strokeRect(2, 4, 76, gap);
                pctx.strokeRect(2, 36 - gap, 76, gap);
              } else if (side === "top") {
                pctx.strokeRect(2, 4, 76, gap);
              } else {
                pctx.strokeRect(2, 36 - gap, 76, gap);
              }
              palette.appendChild(c);
            } else if (def.type === "text") {
              const div = document.createElement("div");
              div.className = "palette-text";
              div.textContent = def.variant === "box"
                ? (def.label || "Textfeld")
                : "Text";
              div.draggable = true;
              div.dataset.elementId = id;
              palette.appendChild(div);
            }
          }
          content.appendChild(palette);
        }

        group.appendChild(header);
        group.appendChild(content);
        controlsContainer.appendChild(group);
      }

      // Ein-/Ausklappen (auch für Unterkategorien)
      controlsContainer.querySelectorAll(".collapsible-header").forEach((hdr) => {
        hdr.addEventListener("click", (ev) => {
          const isCheckbox = ev.target.matches('input[type="checkbox"]');

          // Wenn NICHT direkt die Checkbox geklickt wurde:
          // → Default (Label toggelt Checkbox) verhindern
          if (!isCheckbox) {

          // Bei direktem Klick auf die Checkbox:
          // nur Sichtbarkeit ändern, NICHT auf-/zuklappen
          if (isCheckbox) return;

          ev.stopPropagation();
          const content = hdr.nextElementSibling;
          if (!content) return;
          content.classList.toggle("is-collapsed");
          hdr.querySelector(".arrow")?.classList.toggle("is-collapsed");

      });


      // Sichtbarkeits-Änderungen für Kategorien/Subkategorien (Delegation)
      controlsContainer.addEventListener("change", (ev) => {
        const cb = ev.target;
        if (cb && cb.matches('input[type="checkbox"][data-vkey]')) {
          const key = cb.getAttribute("data-vkey");
          visibility.categories[key] = !!cb.checked;

          // Komfort: Hauptkategorie toggelt alle Unterkategorien mit
          if (key.indexOf("|") === -1) {
            const prefix = key + "|";
            for (const k in visibility.categories) {
              if (k.startsWith(prefix)) visibility.categories[k] = !!cb.checked;
            }
            // Sub-Checkboxen visuell synchronisieren
            controlsContainer.querySelectorAll(`input[type="checkbox"][data-vkey^="${prefix}"]`)
              .forEach(n => n.checked = cb.checked);
          }

          redrawCanvas();
        }
      });

      // Panel-Events (Zeichenmodus-Button)
      controlsContainer.addEventListener("click", (e) => {
        const btn = e.target.closest("#toggle-draw-mode");
        if (!btn) return;

        drawingMode = !drawingMode;
        // ✅ Mode-Konflikt vermeiden: Zeichnen killt MoveMode
        if (drawingMode) {
          setMoveMode(false); // nutzt deine vorhandene Funktion
        }
        btn.setAttribute("aria-pressed", String(drawingMode));
        btn.textContent = drawingMode ? "Zeichenmodus: AN" : "Zeichenmodus: AUS";
        btn.style.backgroundColor = drawingMode ? "#2e7d32" : "#ffffff";
        btn.style.color = "#000000";

        // Cursor und Auswahl bereinigen
        canvas.style.cursor = drawingMode ? "crosshair" : "default";
        selectedElementIndex = null;
        selectedLineIndex = null;

        redrawCanvas();

      // Gleistyp-Änderung via (optionaler) Radiobuttons beibehalten
      controlsContainer.addEventListener("change", (e) => {
