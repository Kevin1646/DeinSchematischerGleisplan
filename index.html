        }
      });
    }


    canvas.addEventListener("mousedown", (e) => {
      if (groupMode !== "add" || e.button !== 0) return;

      const world = screenToWorld(e.clientX, e.clientY);
      const snapped = snapToGridPx(world.x, world.y);

      groupSelectionStart = { ...snapped };
      groupSelectionRect = { x: snapped.x, y: snapped.y, w: 0, h: 0 };

      selectedElementIndex = null;
      selectedLineIndex = null;
      activeGroupId = null;

      redrawCanvas();
    });

    canvas.addEventListener("mouseup", (e) => {
      if (groupMode !== "add" || e.button !== 0) return;
      if (!groupSelectionRect) return;

      redrawCanvas();
    });

    canvas.addEventListener("mousedown", (e) => {
      // Linksklick: Zeichnen ODER Selektieren/Drag/Resize
      if (e.button !== 0) return;
      if (moveMode) return; // Verschiebemodus hat eigene Handler
      if (groupMode === "add") return;

      // Zeichnen hat Vorrang
      if (drawingMode) {
        if (!pendingHistory) pendingHistory = captureState();
        const wp = screenToWorld(e.clientX, e.clientY);
        const sp = isFineLineType(currentLineType)
          ? getFineSnapPoint(wp.x, wp.y)
          : {
            x: Math.round(wp.x / hSpacing) * hSpacing,
            y: Math.round(wp.y / vSpacing) * vSpacing
          };
        startPoint = sp;
        isDrawing = true;
        previewLine = { start: sp, end: sp };
        selectedElementIndex = null;
        selectedLineIndex = null;
        activeGroupId = null;
        redrawCanvas();
        return;
      }


      const worldPoint = screenToWorld(e.clientX, e.clientY);
      let found = false;

      // 1) Klick auf vorhandenes freies Textfeld → nur auswählen, NICHT Editor öffnen
      for (let i = savedElements.length - 1; i >= 0; i--) {
        const el = savedElements[i];
        if (el.type === "text") {
          const relX = worldPoint.x - el.x;
          const relY = worldPoint.y - el.y;
          if (
            relX >= 0 &&
            relX <= el.width &&
            relY >= 0 &&
            relY <= el.height
          ) {
            selectedElementIndex = i;
            selectedLineIndex = null;
            activeEditingGroupId = el.parentId || null;
            renderPropertiesForSelection(true);

            isDragging = true;
            dragOffset = {
              x: Math.max(0, relX),
              y: Math.max(0, relY),
            };
            canvas.style.cursor = "grabbing";
            redrawCanvas();
            return;
          }
        }
      }

      // 2) Klick auf ein beliebiges grafisches Element → ggf. Textfelder erzeugen oder öffnen
      for (let i = savedElements.length - 1; i >= 0; i--) {
        const el = savedElements[i];
        if (el.type === "image") {
          const elData = pixelElements[el.id];
          if (!elData) continue;

          const w = el.width ?? elData.width;
          const h = el.height ?? elData.height;

          const angle = ((el.rotation || 0) * Math.PI) / 180;
          const centerX = el.x + w / 2;
          const centerY = el.y + h / 2;

          // Pointer in unrotated local space (centered)
          const translatedX = worldPoint.x - centerX;
          const translatedY = worldPoint.y - centerY;
          const unrotatedX =
            translatedX * Math.cos(-angle) -
            translatedY * Math.sin(-angle);
          const unrotatedY =
            translatedX * Math.sin(-angle) +
            translatedY * Math.cos(-angle);

          // Convert to top-left local coords (0..w/h)
          const localX = unrotatedX + w / 2;
          const localY = unrotatedY + h / 2;

          if (localX >= 0 && localX <= w && localY >= 0 && localY <= h) {
            selectedElementIndex = i;
            const def = elementDefinitions[el.id];
            const isUploadedImage = !!def?._uploadedAsset;
            isDraggingTracksideElement = def?.placement === "trackside";
            activeGroupId = el.groupId || null;

            const handleSize = 10 / scale;
            const onTL = isUploadedImage && (localX <= handleSize && localY <= handleSize);
            const onTR = isUploadedImage && (Math.abs(localX - w) <= handleSize && localY <= handleSize);
            const onBL = isUploadedImage && (localX <= handleSize && Math.abs(localY - h) <= handleSize);
            const onBR = isUploadedImage && (Math.abs(localX - w) <= handleSize && Math.abs(localY - h) <= handleSize);

            if (onTL || onTR || onBL || onBR) {
              isResizing = true;
              if (!pendingHistory) pendingHistory = captureState();
              moveMode = false;
              canvas.style.cursor = "se-resize";
              el._resizeFrom = onTL ? "TL" : onTR ? "TR" : onBL ? "BL" : "BR";
              el._resizeAspect = h / Math.max(1, w);
            } else {
              isDragging = true;
              dragOffset.x = worldPoint.x - el.x;
              dragOffset.y = worldPoint.y - el.y;
              canvas.style.cursor = "grabbing";
            }

            found = true;
            break;
          }
        } else if (el.type === "text") {
          const pad = 6 / scale;
          const relX = worldPoint.x - el.x;
          const relY = worldPoint.y - el.y;
          if (
            relX >= -pad &&
            relX <= el.width + pad &&
            relY >= -pad &&
            relY <= el.height + pad
          ) {
            selectedElementIndex = i;
            const handleSize = 8 / scale;
            activeGroupId = el.groupId || null
            if (
              relX >= el.width - handleSize &&
              relY >= el.height - handleSize
            ) {
              isResizing = true;
              if (!pendingHistory) pendingHistory = captureState();
              moveMode = false;
              canvas.style.cursor = "se-resize";
            } else {
              isDragging = true;
              dragOffset = {
                x: Math.max(0, relX),
                y: Math.max(0, relY),
              };
              canvas.style.cursor = "grabbing";
            }

            found = true;
            break;
          }
        } else if (el.type === "text_box") {
          const relX = worldPoint.x - el.x;
          const relY = worldPoint.y - el.y;

          if (relX >= 0 && relX <= el.width && relY >= 0 && relY <= el.height) {
            selectedElementIndex = i;
            activeGroupId = el.groupId || null;

            const handleSize = 8 / scale;
            if (relX >= el.width - handleSize && relY >= el.height - handleSize) {
              isResizing = true;
              if (!pendingHistory) pendingHistory = captureState();
              canvas.style.cursor = "se-resize";
            } else {
              isDragging = true;
              dragOffset = {
                x: Math.max(0, relX),
                y: Math.max(0, relY),
              };
              canvas.style.cursor = "grabbing";
            }

            found = true;
            break;
          }
        } else if (el.type === "platform") {
          const pdata = pixelElements[el.id];
          if (!pdata) continue;

          const w = el.width ?? pdata.width;
          const h = el.height ?? pdata.height;

          const relX = worldPoint.x - el.x;
          const relY = worldPoint.y - el.y;

          if (relX >= 0 && relX <= w && relY >= 0 && relY <= h) {
            selectedElementIndex = i;
            activeGroupId = el.groupId || null;

            const handleSize = 10 / scale;
            const onTL = (relX <= handleSize && relY <= handleSize);
            const onTR = (Math.abs(relX - w) <= handleSize && relY <= handleSize);
            const onBL = (relX <= handleSize && Math.abs(relY - h) <= handleSize);
            const onBR = (Math.abs(relX - w) <= handleSize && Math.abs(relY - h) <= handleSize);

            if (onTL || onTR || onBL || onBR) {
              isResizing = true;
              if (!pendingHistory) pendingHistory = captureState();
              canvas.style.cursor = "se-resize";
              el._resizeFrom = onTL ? "TL" : onTR ? "TR" : onBL ? "BL" : "BR";
            } else {
              isDragging = true;
              dragOffset = { x: relX, y: relY };
              canvas.style.cursor = "grabbing";
            }

            found = true;
            break;
          }
        }

      }

      // Falls kein Element: Linie selektieren
      if (!found) {
        activeGroupId = null;
        for (let i = savedLines.length - 1; i >= 0; i--) {
          const line = savedLines[i];
          const props = lineTypes[line.type];
          const distance = getDistanceToLineSegment(
            worldPoint,
            line.start,
            line.end
          );
          if (distance < props.width / 2 + 5 / scale) {
            selectedLineIndex = i;
            found = true;
            break;
          }
        }
      }

      renderPropertiesForSelection();
      redrawCanvas();
    });

    canvas.addEventListener("dblclick", (e) => {
      const worldPoint = screenToWorld(e.clientX, e.clientY);
      let clickedOnText = false;
      let clickedOnSignal = false;

      for (let i = savedElements.length - 1; i >= 0; i--) {
        const el = savedElements[i];

        // Freie Texte + Textfelder mit Rahmen per Doppelklick bearbeiten
        if (el.type === "text" || el.type === "text_box") {
          const relX = worldPoint.x - el.x;
          const relY = worldPoint.y - el.y;

          if (
            relX >= 0 &&
            relX <= el.width &&
            relY >= 0 &&
            relY <= el.height
          ) {
            clickedOnText = true;
            selectedElementIndex = i;
            selectedLineIndex = null;
            activeEditingGroupId = el.parentId || null;
            redrawCanvas();
            createTextEditor(el);
            return;
          }
        }

        // Signal-Doppelklick wie bisher neutral behandeln
        if (el.type === "image" && el.id.startsWith("signal_")) {
          const elData = pixelElements[el.id];
          if (!elData) continue;

          const w = el.width ?? elData.width;
          const h = el.height ?? elData.height;

          if (
            worldPoint.x >= el.x &&
            worldPoint.x <= el.x + w &&
            worldPoint.y >= el.y &&
            worldPoint.y <= el.y + h
          ) {
            clickedOnSignal = true;
          }
        }
      }

      if (!clickedOnText && !clickedOnSignal) {
        activeEditingGroupId = null;
        redrawCanvas();
      }
    });

    // =========================================================
    //   🟦  VERSCHIEBEMODUS – RECHTECK NUR AUF RASTER
    // =========================================================
    function snapToGridPx(x, y) {
      const snappedX = Math.round(x / hSpacing) * hSpacing; // hSpacing: horizontaler Pixelabstand
      const snappedY = Math.round(y / vSpacing) * vSpacing; // vSpacing: vertikaler Pixelabstand
      return { x: snappedX, y: snappedY };
    }

    canvas.addEventListener("mousedown", (e) => {
      if (!moveMode || e.button !== 0) return;

      // Undo-Snapshot auch für Verschieben
      if (!pendingHistory) pendingHistory = captureState();
      if (groupMode === "add") return;

      const world = screenToWorld(e.clientX, e.clientY);
      const snapped = snapToGridPx(world.x, world.y);

      moveStartPoint = { ...snapped };

      // Klick in bestehende Auswahl → verschieben
      if (moveSelectionRect) {
        const rect = normalizeRect(moveSelectionRect);
        if (
          snapped.x >= rect.x &&
          snapped.x <= rect.x + rect.w &&
          snapped.y >= rect.y &&
          snapped.y <= rect.y + rect.h
        ) {
          isDraggingMoveSelection = true;
          return;
        }
      }

      // Neue Auswahl beginnen – Ecken auf Raster!
      isSelectingMoveArea = true;
      moveSelectionRect = { x: snapped.x, y: snapped.y, w: 0, h: 0 };
      moveSelectedItems = [];
      selectedElementIndex = null;
      selectedLineIndex = null;
      renderPropertiesForSelection();
      redrawCanvas();
    });

    canvas.addEventListener("mousemove", (e) => {
      if (!moveMode) return;

      const world = screenToWorld(e.clientX, e.clientY);
      const snapped = snapToGridPx(world.x, world.y);



      // Rechteck aufziehen – immer auf Raster
      if (isSelectingMoveArea && moveSelectionRect) {
        moveSelectionRect.w = snapped.x - moveStartPoint.x;
        moveSelectionRect.h = snapped.y - moveStartPoint.y;
        redrawCanvas();
        drawMoveSelectionRect();
      }

      // Auswahl verschieben – nur in Raster-Schritten
      if (isDraggingMoveSelection && moveSelectedItems.length > 0) {
        const dx = snapped.x - moveStartPoint.x;
        const dy = snapped.y - moveStartPoint.y;

        if (dx !== 0 || dy !== 0) {
          moveStartPoint = { ...snapped };

          moveSelectedItems.forEach((obj) => {
            if (obj.start && obj.end) {
              // Linie (Gleis)
              obj.start.x += dx;
              obj.start.y += dy;
              obj.end.x += dx;
              obj.end.y += dy;
            } else {
              // Normales Element
              obj.x += dx;
              obj.y += dy;
            }
          });

          moveSelectionRect.x += dx;
          moveSelectionRect.y += dy;

          redrawCanvas();
          drawMoveSelectionRect();
        }
      }
    });

    canvas.addEventListener("mouseup", (e) => {
      if (!moveMode || e.button !== 0) return;

      const world = screenToWorld(e.clientX, e.clientY);
      const snapped = snapToGridPx(world.x, world.y);





      // Rechteck fertig aufgezogen → Auswahl erstellen
      if (isSelectingMoveArea && moveSelectionRect) {
        const rect = normalizeRect(moveSelectionRect);
        moveSelectedItems = [];

        // Linien prüfen
        savedLines.forEach((line) => {
          if (
            line.start.x >= rect.x &&
            line.end.x <= rect.x + rect.w &&
            line.start.y >= rect.y &&
            line.end.y <= rect.y + rect.h
          ) {
            moveSelectedItems.push(line);
          }
        });

        // Elemente prüfen
        savedElements.forEach((el) => {
          const elW = el.width || pixelElements[el.id]?.width || 0;
          const elH = el.height || pixelElements[el.id]?.height || 0;
          if (
            el.x >= rect.x &&
            el.x + elW <= rect.x + rect.w &&
            el.y >= rect.y &&
            el.y + elH <= rect.y + rect.h
          ) {
            moveSelectedItems.push(el);
          }
        });

        isSelectingMoveArea = false;
        redrawCanvas();
        drawMoveSelectionRect();
      } else if (isDraggingMoveSelection) {
        // Beenden
        isDraggingMoveSelection = false;
        redrawCanvas();
        drawMoveSelectionRect();
      }
      if (pendingHistory) {
        const changed = JSON.stringify(pendingHistory) !== JSON.stringify(captureState());
        pendingHistory = null;
        if (changed) pushHistory("move/resize");
      }

    });

    function normalizeRect(r) {
      const x = r.w < 0 ? r.x + r.w : r.x;
      const y = r.h < 0 ? r.y + r.h : r.y;
      return { x, y, w: Math.abs(r.w), h: Math.abs(r.h) };
    }

    // Alle Gruppen-Mitglieder (Elemente + Linien) für eine groupId finden
    function getGroupMembers(groupId) {
      const elems = savedElements.filter(el => el.groupId === groupId && isElementVisible(el));
      const lines = savedLines.filter(line => line.groupId === groupId && isLineVisible(line));
      return { elems, lines };
    }

    // Bounding-Box einer Gruppe in Weltkoordinaten
    function getGroupBounds(groupId) {
      const { elems, lines } = getGroupMembers(groupId);
      if (elems.length === 0 && lines.length === 0) return null;

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

      elems.forEach(el => {
        const w = el.width || pixelElements[el.id]?.width || 0;
        const h = el.height || pixelElements[el.id]?.height || 0;
        minX = Math.min(minX, el.x);
        minY = Math.min(minY, el.y);
        maxX = Math.max(maxX, el.x + w);
        maxY = Math.max(maxY, el.y + h);
      });

      lines.forEach(line => {
        minX = Math.min(minX, line.start.x, line.end.x);
        minY = Math.min(minY, line.start.y, line.end.y);
        maxX = Math.max(maxX, line.start.x, line.end.x);
        maxY = Math.max(maxY, line.start.y, line.end.y);
      });

      if (!Number.isFinite(minX)) return null;
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    // Abstand für Duplikat in cm
    const DUPLICATE_OFFSET_CM = 0.8;
    const DUPLICATE_OFFSET_PX = DUPLICATE_OFFSET_CM * PIXELS_PER_CM;

    // komplette Gruppe duplizieren (Elemente + Linien)
    function duplicateGroup(groupId) {
      const { elems, lines } = getGroupMembers(groupId);
      if (elems.length === 0 && lines.length === 0) return;

      const newGroupId = `grp_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      const uidMap = {};
      const newElems = [];

      // Elemente klonen
      elems.forEach(orig => {
        const clone = JSON.parse(JSON.stringify(orig));
        clone.x += 0;
        clone.y -= DUPLICATE_OFFSET_PX;       // 2 cm nach oben
        clone.groupId = newGroupId;

        if (clone.uid) {
          const newUid = `uid_${Date.now()}_${Math.random().toString(16).slice(2)}`;
          uidMap[clone.uid] = newUid;
          clone.uid = newUid;
        }

        newElems.push(clone);
      });

      // parentId auf neue UIDs mappen
      newElems.forEach(clone => {
        if (clone.parentId && uidMap[clone.parentId]) {
          clone.parentId = uidMap[clone.parentId];
        }
      });

      const baseIndex = savedElements.length;
      newElems.forEach(clone => savedElements.push(clone));

      // Linien klonen
      lines.forEach(orig => {
        const clone = JSON.parse(JSON.stringify(orig));
        clone.start.y -= DUPLICATE_OFFSET_PX;
        clone.end.y -= DUPLICATE_OFFSET_PX;
        clone.groupId = newGroupId;
        savedLines.push(clone);
      });

      activeGroupId = newGroupId;
      selectedElementIndex = baseIndex;
      selectedLineIndex = null;

      redrawCanvas();
      pushHistory("duplicate group");
    }

    // einzelnes Element (mit evtl. Texten) duplizieren
    function duplicateSingleElement(index) {
      const orig = savedElements[index];
      if (!orig) return;

      const uidMap = {};
      const newElems = [];

      const baseClone = JSON.parse(JSON.stringify(orig));
      baseClone.x += 0;
      baseClone.y -= DUPLICATE_OFFSET_PX;
      delete baseClone.groupId;

      if (baseClone.uid) {
        const newUid = `uid_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        uidMap[baseClone.uid] = newUid;
        baseClone.uid = newUid;
      }

      newElems.push(baseClone);

      // zugehörige Texte mit duplizieren
      if (orig.uid) {
        savedElements.forEach(el => {
          if (el.parentId === orig.uid) {
            const childClone = JSON.parse(JSON.stringify(el));
            childClone.x += 0;
            childClone.y -= DUPLICATE_OFFSET_PX;
            delete childClone.groupId;
            if (uidMap[childClone.parentId]) {
              childClone.parentId = uidMap[childClone.parentId];
            }
            newElems.push(childClone);
          }
        });
      }

      const baseIndex = savedElements.length;
      newElems.forEach(clone => savedElements.push(clone));

      activeGroupId = null;
      selectedElementIndex = baseIndex;
      selectedLineIndex = null;

      redrawCanvas();
      pushHistory("duplicate element");
    }

    // einzelne Linie duplizieren
    function duplicateSingleLine(index) {
      const orig = savedLines[index];
      if (!orig) return;

      const clone = JSON.parse(JSON.stringify(orig));
      clone.start.y -= DUPLICATE_OFFSET_PX;
      clone.end.y -= DUPLICATE_OFFSET_PX;
      delete clone.groupId;

      savedLines.push(clone);
      selectedLineIndex = savedLines.length - 1;
      selectedElementIndex = null;
      activeGroupId = null;

      redrawCanvas();
      pushHistory("duplicate line");
    }

    // zentrale Auswahl-Logik
    function duplicateCurrentSelection() {
      // 1. Gruppe im Fokus?
      let groupIdToDuplicate = null;

      if (activeGroupId) {
        groupIdToDuplicate = activeGroupId;
      } else if (selectedElementIndex !== null) {
        const el = savedElements[selectedElementIndex];
        if (el && el.groupId) groupIdToDuplicate = el.groupId;
      } else if (selectedLineIndex !== null) {
        const line = savedLines[selectedLineIndex];
        if (line && line.groupId) groupIdToDuplicate = line.groupId;
      }

      if (groupIdToDuplicate) {
        duplicateGroup(groupIdToDuplicate);
        return;
      }

      // 2. Einzel-Element?
      if (selectedElementIndex !== null) {
        duplicateSingleElement(selectedElementIndex);
        return;
      }

      // 3. Einzel-Linie?

    // Aus einem aufgezogenen Rechteck eine neue Gruppe bilden
    function createGroupFromRect(rect) {
      const r = normalizeRect(rect);
      const groupId = `grp_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      let hasMembers = false;

      // Nur "echte" top-level Elemente gruppieren.
      // Verknüpfte Texte mit parentId NICHT direkt gruppieren –
      // deren Sichtbarkeit/Bewegung läuft weiter über die Mutter.
      savedElements.forEach(el => {
        if (el.parentId) return;

        const w = el.width || pixelElements[el.id]?.width || 0;
        const h = el.height || pixelElements[el.id]?.height || 0;

        if (
          el.x >= r.x &&
          el.y >= r.y &&
          el.x + w <= r.x + r.w &&
          el.y + h <= r.y + r.h
        ) {
          el.groupId = groupId;
          hasMembers = true;

          // Zugehörige Texte der Mutter NICHT separat als Gruppenobjekt behandeln,
          // aber dieselbe groupId spiegeln, damit Bewegung weiter konsistent bleibt.
          if (el.uid) {
            savedElements.forEach(child => {
              if (child.parentId === el.uid) {
                child.groupId = groupId;
              }
            });
          }
        }
      });

      // Linien wie bisher
      savedLines.forEach(line => {
        if (
          line.start.x >= r.x &&
          line.start.y >= r.y &&
          line.end.x <= r.x + r.w &&
          line.end.y <= r.y + r.h
        ) {
          line.groupId = groupId;
          hasMembers = true;
        }
      });

      return hasMembers ? groupId : null;
    }

    // Gruppierung wieder auflösen
    function removeGroup(groupId) {
      savedElements.forEach(el => {
        if (el.groupId === groupId) delete el.groupId;
      });
      savedLines.forEach(line => {
        if (line.groupId === groupId) delete line.groupId;
      });
    }


    function drawMoveSelectionRect() {
      if (!moveSelectionRect) return;
      ctx.save();
      ctx.translate(origin.x, origin.y);
      ctx.scale(scale, scale);
      const rect = normalizeRect(moveSelectionRect);
      ctx.strokeStyle = "rgba(0, 0, 255, 0.7)";
      ctx.lineWidth = 1 / scale;
      ctx.setLineDash([5 / scale, 3 / scale]);
      ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
      ctx.restore();
    }


    canvas.addEventListener("mousemove", (e) => {
      // Gruppen-Rechteck beim Aufziehen (GRUPPE +)
      if (groupMode === "add" && groupSelectionRect && (e.buttons & 1)) {

        const snapped = snapToGridPx(world.x, world.y);
        groupSelectionRect.w = snapped.x - groupSelectionStart.x;
        groupSelectionRect.h = snapped.y - groupSelectionStart.y;
        redrawCanvas();
        return; // währenddessen keine anderen Aktionen
      }

      if (isPanning) {
        if (currentEditor) return;
        const dx = e.clientX - lastPanPoint.x;
        const dy = e.clientY - lastPanPoint.y;

        origin.y += dy;
        lastPanPoint = { x: e.clientX, y: e.clientY };

        return;

      const worldPoint = screenToWorld(e.clientX, e.clientY);

      if (isResizing && selectedElementIndex !== null) {
        const el = savedElements[selectedElementIndex];

        // Text-Resize (wie bisher)
        if (el.type === "text" || el.type === "text_box") {
          const newWidth = getVerticalSnap(worldPoint.x) - el.x;
          const newHeight = getClosestSnapY(worldPoint.y) - el.y;
          el.width = Math.max(newWidth, 20 / scale);
          el.height = Math.max(newHeight, 20 / scale);

          return;
        }


        // ▼▼▼ Image-Resize
        if (el.type === "image") {
          const pdata = pixelElements[el.id];
          if (!pdata) return;

          const startW = el.width ?? pdata.width;
          const startH = el.height ?? pdata.height;
          const minSize = 10 / scale;

          // Mauspunkt in Welt (ggf. unrotieren)
          const angle = ((el.rotation || 0) * Math.PI) / 180;
          const centerX = el.x + startW / 2;
          const centerY = el.y + startH / 2;

          const translatedX = worldPoint.x - centerX;
          const translatedY = worldPoint.y - centerY;
          const unrotatedX =
            translatedX * Math.cos(-angle) -
            translatedY * Math.sin(-angle);
          const unrotatedY =
            translatedX * Math.sin(-angle) +
            translatedY * Math.cos(-angle);

          const from = el._resizeFrom || "BR";

          // local coords (0..w/h)
          const localX = unrotatedX + startW / 2;
          const localY = unrotatedY + startH / 2;

          let newX = el.x, newY = el.y, newW = startW, newH = startH;

          // axis-aligned resize in unrotated frame
          if (from === "BR") {
            newW = Math.max(minSize, localX);
            newH = Math.max(minSize, localY);
          } else if (from === "TR") {
            newW = Math.max(minSize, localX);
            newH = Math.max(minSize, startH - localY);
            newY = el.y + (startH - newH);
          } else if (from === "BL") {
            newW = Math.max(minSize, startW - localX);
            newH = Math.max(minSize, localY);
            newX = el.x + (startW - newW);
          } else if (from === "TL") {
            newW = Math.max(minSize, startW - localX);
            newH = Math.max(minSize, startH - localY);
            newX = el.x + (startW - newW);
            newY = el.y + (startH - newH);
          }

          // Aspect-Ratio beibehalten
          const a = el._resizeAspect ?? (startH / Math.max(1, startW));
          newH = Math.max(minSize, newW * a);

          // Snap (optional: nur X/Y, nicht Größe)
          el.x = getVerticalSnap(newX);
          el.y = getClosestSnapY(newY);
          el.width = newW;
          el.height = newH;

          redrawCanvas();
          return;
        }


        // ▼▼▼ Platform-Resize
        if (el.type === "platform") {
          const pdata = pixelElements[el.id];
          const minW = 0.5 * PIXELS_PER_CM;                          // min. 0,5 cm Breite
          const minH = Math.max(pdata.gapPx * 1.05, 0.1 * PIXELS_PER_CM); // min. knapp über Streifenhöhe, aber ≥ 1 mm


          // Zielpunkt aufs Raster
          const snapX = getVerticalSnap(worldPoint.x);
          const snapY = getClosestSnapY(worldPoint.y);

          let x0 = el.x;
          let y0 = el.y;
          let w = el.width;
          let h = el.height;

          switch (el._resizeFrom) {
            case "TL":
              w = (x0 + w) - snapX;
              h = (y0 + h) - snapY;
              x0 = snapX;
              y0 = snapY;
              break;
            case "TR":
              w = snapX - x0;
              h = (y0 + h) - snapY;
              y0 = snapY;
              break;
            case "BL":
              w = (x0 + w) - snapX;
              h = snapY - y0;
              x0 = snapX;
              break;
            case "BR":
            default:
              w = snapX - x0;
              h = snapY - y0;
              break;
          }

          // Mindestgrößen
          el.x = x0;
          el.y = y0;
          el.width = Math.max(w, minW);
          el.height = Math.max(h, minH);

          // WICHTIG: gap bleibt konstant -> nichts ändern
          redrawCanvas();
          return;
        } if (el.type === "text" || el.type === "text_box") {
          const newWidth = getVerticalSnap(worldPoint.x) - el.x;
          const newHeight = getClosestSnapY(worldPoint.y) - el.y;

      if (isDragging && selectedElementIndex !== null) {

            savedLines.forEach(line => {

                line.start.x += dx;
                line.end.x += dx;
                line.start.y += dy;
                line.end.y += dy;

            });
          } else if (selectedElement.uid) {
            // altes Verhalten nur, wenn NICHT gruppiert

            });
          }
        }


        if (selectedElement.type === "image") {
          const elData = pixelElements[selectedElement.id];
          if (isDraggingTracksideElement) {
            const previewSnap = getTracksideSnapPosition(
              { x: newX, y: newY },
              elData
            );
            tracksideSnapIndicator = {
              x: previewSnap.x,
              y: previewSnap.y,
              width: elData.width,
              height: elData.height,
            };
            previewElement = null;
          } else {
            let snapX = getVerticalSnap(newX);
            let snapY;
            if (isSwitch(selectedElement.id)) {
              snapX = getSnapPoint(newX, newY).x;
              snapY = getGridSnapY(newY, elData.height);
            } else {
              snapY = getClosestSnapY(newY);
            }
            previewElement = {
              x: snapX,
              y: snapY,
              width: elData.width,
              height: elData.height,
            };
            tracksideSnapIndicator = null;
          }
        }
        else if (selectedElement.type === "platform") {
          const w = selectedElement.width ?? pixelElements[selectedElement.id]?.width;
          const h = selectedElement.height ?? pixelElements[selectedElement.id]?.height;

          // Live-Snap: vertikal fein (getVerticalSnap), horizontal auf die kleinen blauen (getClosestSnapY)
          const snapX = getVerticalSnap(newX);
          const snapY = getClosestSnapY(newY);

          previewElement = { x: snapX, y: snapY, width: w, height: h };
          tracksideSnapIndicator = null;
          redrawCanvas();
          return;
        }
        redrawCanvas();
      }

      if (isDrawing && drawingMode) {
        const wp = screenToWorld(e.clientX, e.clientY);
        const sp = isFineLineType(currentLineType)
          ? getFineSnapPoint(wp.x, wp.y)
          : {
            x: Math.round(wp.x / hSpacing) * hSpacing,
            y: Math.round(wp.y / vSpacing) * vSpacing

      if (!drawingMode && !isDragging) {

        let onObject = false;

            const elData = pixelElements[el.id];
            if (!elData) continue;
            const w = el.width ?? elData.width;
            const h = el.height ?? elData.height;
            const angle = ((el.rotation || 0) * Math.PI) / 180;
            const centerX = el.x + w / 2;
            const centerY = el.y + h / 2;
            const translatedX = worldPoint.x - centerX;
            const translatedY = worldPoint.y - centerY;
            const unrotatedX =
              translatedX * Math.cos(-angle) -
              translatedY * Math.sin(-angle);
            const unrotatedY =
              translatedX * Math.sin(-angle) +
              translatedY * Math.cos(-angle);
            if (
              Math.abs(unrotatedX) <= w / 2 &&
              Math.abs(unrotatedY) <= h / 2
            ) {

            }
          } else if (el.type === "text") {

            if (
              worldPoint.x >= el.x - pad &&
              worldPoint.x <= el.x + el.width + pad &&
              worldPoint.y >= el.y - pad &&
              worldPoint.y <= el.y + el.height + pad
            ) {

    canvas.addEventListener("mouseup", (e) => {

      } if (pendingHistory) {

        const selectedElement = savedElements[selectedElementIndex];

        if (selectedElement.type === "image") {

          const elDef = elementDefinitions[selectedElement.id];
          if (elDef?.placement === "trackside") {

              finalX = getVerticalSnap(selectedElement.x);

          }
        } else if (selectedElement.type === "text" || selectedElement.type === "text_box") {
          finalX = getVerticalSnap(selectedElement.x);

          // Finales Einschnappen auf: vertikal fein (getVerticalSnap), horizontal kleine blaue Linien (getClosestSnapY)
          finalX = getVerticalSnap(selectedElement.x);
          finalY = getClosestSnapY(selectedElement.y);

              el.y += dy;

        isDraggingTracksideElement = false;
        previewElement = null;
        tracksideSnapIndicator = null;
        canvas.style.cursor = "grab";
        redrawCanvas();
      }
      if (pendingHistory) {
        const changed = JSON.stringify(pendingHistory) !== JSON.stringify(captureState());
        pendingHistory = null;
        if (changed) pushHistory("move element");

          };

    // Zoom (Mausrad); deaktiviert während Textbearbeitung

        x: e.clientX - rect.left,

      };

        x: (mousePoint.x - origin.x) / scale,
        y: (mousePoint.y - origin.y) / scale,
      };
      const scaleFactor = e.deltaY > 0 ? 0.9 : 1.1;

    function setScaleToOne() {
      const rect = canvas.getBoundingClientRect();
      const centerScreen = { x: rect.width / 2, y: rect.height / 2 };
      const worldCenterBefore = {
        x: (centerScreen.x - origin.x) / scale,
        y: (centerScreen.y - origin.y) / scale,
      };

      scale = 1.0;
      origin.x = centerScreen.x - worldCenterBefore.x * scale;
      origin.y = centerScreen.y - worldCenterBefore.y * scale;

      updateScaleIndicator();
      redrawCanvas();
    }

    function drawISO7200TitleBlock(pdf, pageWmm, pageHmm, data) {
      // Grundlayout: unten rechts, mit Rand (10 mm)
      const margin = 10;
      // Zielgröße des Blocks – passt typisch für A3/A4, skaliert runter wenn nötig
      const targetW = 180; // mm
      const targetH = 55;  // mm

      // Falls kleineres Blatt: automatisch anpassen (Seitenränder respektieren)
      const maxW = Math.max(60, pageWmm - 2 * margin);
      const maxH = Math.max(30, pageHmm - 2 * margin);
      const scale = Math.min(targetW / targetW, targetH / targetH, maxW / targetW, maxH / targetH); // = min(1, …)
      const w = targetW * scale;
      const h = targetH * scale;

      const x0 = pageWmm - margin - w;
      const y0 = pageHmm - margin - h;

      // Linienstile
      pdf.setLineWidth(0.3);
      pdf.setDrawColor(0);

      // Außenrahmen
      pdf.rect(x0, y0, w, h);

      // Typische ISO-7200-Aufteilung (vereinfachtes, gebräuchliches Schema):
      // Rechte Spalte (für Firma/Logo & Freigaben)
      const colR = w * 0.28;                // rechte Spaltenbreite
      const xR = x0 + w - colR;             // rechte Spalte X
      const rowSmall = h * 0.22;            // obere kleine Box rechts
      const rowSmall2 = h * 0.22;           // zweite kleine Box rechts
      const rowRest = h - rowSmall - rowSmall2; // untere große Box rechts

      // Spaltentrenner
      pdf.line(xR, y0, xR, y0 + h);

      // Horizontale Trennlinien rechts
      pdf.line(xR, y0 + rowSmall, x0 + w, y0 + rowSmall);
      pdf.line(xR, y0 + rowSmall + rowSmall2, x0 + w, y0 + rowSmall + rowSmall2);

      // Linke Hauptfläche (Titel, Projekt, Nummer usw.)
      const xL = x0;
      const wL = w - colR;

      // Linke Fläche horizontale Unterteilungen:
      const rowTitle = h * 0.38;        // Titel/Benennung groß
      const rowProject = h * 0.18;      // Projekt
      const rowBottom = h - rowTitle - rowProject; // Unterster Bereich: Nr/Index/Blatt/Maßstab

      pdf.line(xL, y0 + rowTitle, xL + wL, y0 + rowTitle);
      pdf.line(xL, y0 + rowTitle + rowProject, xL + wL, y0 + rowTitle + rowProject);

      // Unterster Bereich weiter unterteilen (4 Felder)
      const bottomCols = [0.46, 0.18, 0.18, 0.18]; // TitelNr | Blatt | Maßstab | Index
      let accu = xL;
      for (let i = 0; i < bottomCols.length - 1; i++) {
        accu += wL * bottomCols[i];
        pdf.line(accu, y0 + rowTitle + rowProject, accu, y0 + h);
      }

      // Label-Text (klein), Inhalt (normal)
      const fsLabel = 6.5;
      const fsBody = 8.5;
      const pad = 2;

      pdf.setFont("helvetica", "normal");

      // --- Linke Seite Inhalte ---
      // Titel
      pdf.setFontSize(fsLabel);
      pdf.text("Benennung / Title", xL + pad, y0 + pad + 3);
      pdf.setFontSize(fsBody);
      pdf.text(data.title || "", xL + pad, y0 + pad + 3 + 5, { maxWidth: wL - 2 * pad });

      // Projekt
      pdf.setFontSize(fsLabel);
      pdf.text("Projekt / Project", xL + pad, y0 + rowTitle + pad + 3);
      pdf.setFontSize(fsBody);
      pdf.text(data.project || "", xL + pad, y0 + rowTitle + pad + 3 + 5, { maxWidth: wL - 2 * pad });

      // Untere Zeile: Zeichnungsnummer, Blatt, Maßstab, Index
      const xNr = xL + pad;
      const yBottom = y0 + rowTitle + rowProject + pad + 3;

      // Zeichnungsnummer (links groß)
      pdf.setFontSize(fsLabel);
      pdf.text("Zeichnungs-Nr.", xNr, yBottom);
      pdf.setFontSize(fsBody);
      pdf.text(data.drawingNumber || "", xNr, yBottom + 5, { maxWidth: wL * bottomCols[0] - 2 * pad });

      // Blatt
      const xBlatt = xL + wL * bottomCols[0] + pad;
      pdf.setFontSize(fsLabel);
      pdf.text("Blatt", xBlatt, yBottom);
      pdf.setFontSize(fsBody);
      pdf.text(data.sheet || "", xBlatt, yBottom + 5);

      // Maßstab
      const xScale = xL + wL * (bottomCols[0] + bottomCols[1]) + pad;
      pdf.setFontSize(fsLabel);
      pdf.text("Maßstab", xScale, yBottom);
      pdf.setFontSize(fsBody);
      pdf.text(data.scaleText || "", xScale, yBottom + 5);

      // Index / Revision
      const xRev = xL + wL * (bottomCols[0] + bottomCols[1] + bottomCols[2]) + pad;
      pdf.setFontSize(fsLabel);
      pdf.text("Index", xRev, yBottom);
      pdf.setFontSize(fsBody);
      pdf.text(data.revision || "", xRev, yBottom + 5);

      // --- Rechte Spalte ---
      // Box 1: Firma/Logo
      pdf.setFontSize(fsLabel);
      pdf.text("Firma", xR + pad, y0 + pad + 3);
      pdf.setFontSize(fsBody);
      pdf.text(data.company || "", xR + pad, y0 + pad + 3 + 5, { maxWidth: colR - 2 * pad });

      // Box 2: Datum
      pdf.setFontSize(fsLabel);
      pdf.text("Datum", xR + pad, y0 + rowSmall + pad + 3);
      pdf.setFontSize(fsBody);
      const dateText = data.date ? data.date : "";
      pdf.text(dateText, xR + pad, y0 + rowSmall + pad + 3 + 5);

      // Box 3: Gezeichnet / Geprüft / Freigabe (untere große Box, drei Zeilen)
      const yR3 = y0 + rowSmall + rowSmall2;
      const r3RowH = (rowRest - 2 * pad) / 3;

      pdf.setFontSize(fsLabel);
      pdf.text("Gezeichnet", xR + pad, yR3 + pad + 3);
      pdf.setFontSize(fsBody);
      pdf.text(data.drawnBy || "", xR + pad, yR3 + pad + 3 + 5);

      pdf.setFontSize(fsLabel);
      pdf.text("Geprüft", xR + pad, yR3 + pad + 3 + r3RowH);
      pdf.setFontSize(fsBody);
      pdf.text(data.checkedBy || "", xR + pad, yR3 + pad + 3 + r3RowH + 5);

      pdf.setFontSize(fsLabel);
      pdf.text("Freigabe", xR + pad, yR3 + pad + 3 + 2 * r3RowH);
      pdf.setFontSize(fsBody);
      pdf.text(data.approvedBy || "", xR + pad, yR3 + pad + 3 + 2 * r3RowH + 5);

      // Optionales Zusatzfeld (links unten über Nummer)
      if (data.notes) {
        pdf.setFontSize(fsLabel);
        pdf.text("Hinweise", xL + pad, y0 + h - 2 * pad - 8);
        pdf.setFontSize(fsBody);
        pdf.text(data.notes, xL + pad, y0 + h - 2 * pad - 2, { maxWidth: wL - 2 * pad });
      }
    }

    // DIN 824 Form A – Falzmarken relativ zur Blattkante LINKS/OBEN (0/0 oben links)
    function getDin824FoldLinesMM(pageWmm, pageHmm) {
      const A4W = 210, A4H = 297;
      const isLandscape = pageWmm >= pageHmm;   // quer = true

      // harte Zuordnung nur für A-Reihe
      const near = (a, b, t = 2) => Math.abs(a - b) <= t;
      let sizeKey = null;
      if (isLandscape && near(pageWmm, 420) && near(pageHmm, 297)) sizeKey = "A3";
      else if (isLandscape && near(pageWmm, 594) && near(pageHmm, 420)) sizeKey = "A2";
      else if (isLandscape && near(pageWmm, 841) && near(pageHmm, 594)) sizeKey = "A1";
      else if (isLandscape && near(pageWmm, 1189) && near(pageHmm, 841)) sizeKey = "A0";
      else if (!isLandscape && near(pageHmm, 420) && near(pageWmm, 297)) sizeKey = "A3P";
      else if (!isLandscape && near(pageHmm, 594) && near(pageWmm, 420)) sizeKey = "A2P";
      else if (!isLandscape && near(pageHmm, 841) && near(pageWmm, 594)) sizeKey = "A1P";
      else if (!isLandscape && near(pageHmm, 1189) && near(pageWmm, 841)) sizeKey = "A0P";

      if (!sizeKey) return { vertical: [], horizontal: [] };

      // Längs-Paneele für Form A (Heftrand links)
      // Landscape: entlang der Breite (x von LINKS), Portrait: entlang der Höhe (y von OBEN)
      function longFoldPositions(total) {
        let panels;
        if (sizeKey.startsWith("A3")) panels = [210, 190];
        else if (sizeKey.startsWith("A2")) panels = [210, 192, 192];
        else if (sizeKey.startsWith("A1")) panels = [210, 190, 190, 190];
        else if (sizeKey.startsWith("A0")) panels = [210, 190, 190, 190, 190];
        else panels = [];

        const pos = [];
        let acc = 0;
        for (let i = 0; i < panels.length; i++) {
          acc += panels[i];
          if (acc < total - 0.5) pos.push(acc); // keine Außenkante
        }
        return pos;
      }

      function crossFoldPositions(total) {
        const pos = [];
        const step = 297; // A4-Höhe
        for (let k = 1; k * step < total - 0.5; k++) {
          pos.push(total - k * step); // Position von unten nach oben
        }
        return pos;
      }
      if (isLandscape) {
        // Lange Seite = Breite → Längsfalze sind x (vertical), Querfalze sind y (horizontal)
        const vertical = longFoldPositions(pageWmm);
        const horizontal = (sizeKey === "A3") ? [] : crossFoldPositions(pageHmm);
        return { vertical, horizontal };
      } else {
        // Portrait: lange Seite = Höhe → Längsfalze sind y (horizontal), Querfalze sind x (vertical)
        const horizontal = longFoldPositions(pageHmm);
        const vertical = (sizeKey === "A3P") ? [] : crossFoldPositions(pageWmm);
        return { vertical, horizontal };
      }
    }




    // kleine Hilfsfunktion: kurze Ticks an Kante zentriert zeichnen
    function drawFoldTicks(pdf, pageWmm, pageHmm, opts = {}) {
      const { vertical = [], horizontal = [] } = opts;
      const tickLen = 5;       // 5 mm lange Markierung
      const inset = 2;       // 2 mm vom Rand nach innen
      const lineW = 0.2;     // 0.2 mm Strichstärke

      pdf.setDrawColor(0);
      pdf.setLineWidth(lineW);

      // Vertikale Positionen (x) -> Ticks an oberer & unterer Kante
      vertical.forEach(x => {
        // oben
        pdf.line(x, inset, x, inset + tickLen);
        // unten
        pdf.line(x, pageHmm - inset - tickLen, x, pageHmm - inset);
      });

      // Horizontale Positionen (y) -> Ticks an linker & rechter Kante
      horizontal.forEach(y => {
        // links
        pdf.line(inset, y, inset + tickLen, y);
        // rechts
        pdf.line(pageWmm - inset - tickLen, y, pageWmm - inset, y);
      });
    }

    function isFiniteNumber(n) {
      return Number.isFinite(n) && !Number.isNaN(n);
    }

    function safeNumber(n, fallback) {
      return isFiniteNumber(n) ? n : fallback;
    }

    function sanitizeColor(color, fallback = "#000000") {
      try {
        const c = document.createElement("canvas").getContext("2d");
        c.fillStyle = color;
        return c.fillStyle || fallback;
      } catch {
        return fallback;
      }
    }

    function sanitizeTextElement(el) {
      // Standardwerte
      el.text = typeof el.text === "string" ? el.text : "";
      el.fontSize = safeNumber(el.fontSize, 6);
      el.fontStyle = (el.fontStyle === "italic") ? "italic" : "normal";
      el.fontWeight = (el.fontWeight === "bold") ? "bold" : "normal";
      el.color = sanitizeColor(el.color, "#000000");
      el.textColor = sanitizeColor(el.textColor, el.color || "#000000");
      el.align = (el.align === "left" || el.align === "right" || el.align === "center") ? el.align : "center";

      // Geometrie
      el.x = safeNumber(el.x, 0);
      el.y = safeNumber(el.y, 0);
      el.width = Math.max(1, safeNumber(el.width, 20));
      el.height = Math.max(1, safeNumber(el.height, 12));
      el.rotation = safeNumber(el.rotation, 0);

      return el;
    }

    function sanitizeTextBox(el) {
      sanitizeTextElement(el);
      el.fillColor = sanitizeColor(el.fillColor, "#FFFFFF");
      el.borderColor = sanitizeColor(el.borderColor, "#000000");
      return el;
    }

    /** Prüft minimale Felder und “repariert”, gibt false zurück wenn komplett unbrauchbar */
    function sanitizeElementForExport(el) {
      if (!el || typeof el !== "object" || !el.type) return false;

      // Gemeinsame Geometrie
      el.x = safeNumber(el.x, 0);
      el.y = safeNumber(el.y, 0);
      el.rotation = safeNumber(el.rotation, 0);

      if (el.type === "text") return !!sanitizeTextElement(el);
      if (el.type === "text_box") return !!sanitizeTextBox(el);
      if (el.type === "image") return true;
      if (el.type === "platform") return true;
      return true; // Unbekanntes Element nicht blockieren
    }

    function getFineSnapPoint(x, y) {
      const hSmall = hSpacing / 3;
      const vSmall = vSpacing / 3;
      return {
        x: Math.round(x / hSmall) * hSmall,
        y: Math.round(y / vSmall) * vSmall
      };

    function colorToRgb(color) {
      const c = document.createElement("canvas").getContext("2d");
      c.fillStyle = color;
      const normalized = c.fillStyle;

      if (normalized.startsWith("#")) {
        let hex = normalized.slice(1);
        if (hex.length === 3) {
          hex = hex.split("").map(ch => ch + ch).join("");
        }
        const num = parseInt(hex, 16);
        return {
          r: (num >> 16) & 255,
          g: (num >> 8) & 255,
          b: num & 255
        };
      }

      const m = normalized.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
      if (m) {
        return {
          r: Number(m[1]),
          g: Number(m[2]),
          b: Number(m[3])
        };
      }

      return { r: 0, g: 0, b: 0 };
    }
    function pdfCenteredMultilineText(pdf, text, xmm, ymm, wmm, hmm, fontPx, color, align = "center") {
      const { r, g, b } = colorToRgb(color || "#000000");

      const safeAlign = (align === "left" || align === "right" || align === "center") ? align : "center";
      const padMM = toPdfSize(2);

      let textX = xmm + wmm / 2;
      if (safeAlign === "left") textX = xmm + padMM;
      if (safeAlign === "right") textX = xmm + wmm - padMM;

      const startY = ymm + (hmm - lines.length * lhMM) / 2 + lhMM * 0.8;

      lines.forEach((line, i) => {
        pdf.text(line, textX, startY + i * lhMM, {
          align: safeAlign,
          baseline: "alphabetic"
        });
      });
    }
    async function exportPatternLineAsVector(pdf, line, props) {
      const SVG_NS = "http://www.w3.org/2000/svg";

      const x1px = line.start.x;
      const y1px = line.start.y;
      const x2px = line.end.x;
      const y2px = line.end.y;

      const strokeWidthPx = props.width || 1;
      const outlinePx = props.outline?.thickness || 0;

      const fillColor = sanitizeColor(props.color || "#000000", "#000000");
      const outlineColor = sanitizeColor(props.outline?.color || fillColor, fillColor);

      const cellPx = PINK_CELL || 2;
      const padPx = Math.ceil(strokeWidthPx / 2 + outlinePx + cellPx * 2);

      const minXpx = Math.min(x1px, x2px) - padPx;
      const minYpx = Math.min(y1px, y2px) - padPx;
      const maxXpx = Math.max(x1px, x2px) + padPx;
      const maxYpx = Math.max(y1px, y2px) + padPx;

      const bwPx = Math.max(1, maxXpx - minXpx);
      const bhPx = Math.max(1, maxYpx - minYpx);

      const bwMm = toPdfSize(bwPx);
      const bhMm = toPdfSize(bhPx);

      const x1mm = toPdfSize(x1px - minXpx);
      const y1mm = toPdfSize(y1px - minYpx);
      const x2mm = toPdfSize(x2px - minXpx);
      const y2mm = toPdfSize(y2px - minYpx);

      const strokeWidthMm = toPdfSize(strokeWidthPx);
      const outlineMm = toPdfSize(outlinePx);
      const cellMm = toPdfSize(cellPx);

      const dx = x2mm - x1mm;
      const dy = y2mm - y1mm;
      const len = Math.hypot(dx, dy) || 1;

      const nx = -dy / len;
      const ny = dx / len;
      const half = strokeWidthMm / 2;

      // Polygon für die eigentliche Linienfläche (butt caps)
      const p1x = x1mm + nx * half;
      const p1y = y1mm + ny * half;
      const p2x = x2mm + nx * half;
      const p2y = y2mm + ny * half;
      const p3x = x2mm - nx * half;
      const p3y = y2mm - ny * half;
      const p4x = x1mm - nx * half;
      const p4y = y1mm - ny * half;

      const svg = document.createElementNS(SVG_NS, "svg");
      svg.setAttribute("xmlns", SVG_NS);
      svg.setAttribute("width", `${bwMm}mm`);
      svg.setAttribute("height", `${bhMm}mm`);
      svg.setAttribute("viewBox", `0 0 ${bwMm} ${bhMm}`);

      const defs = document.createElementNS(SVG_NS, "defs");
      const clip = document.createElementNS(SVG_NS, "clipPath");
      const clipId = `clip_${Math.random().toString(36).slice(2)}`;
      clip.setAttribute("id", clipId);

      const poly = document.createElementNS(SVG_NS, "polygon");
      poly.setAttribute(
        "points",
        `${p1x},${p1y} ${p2x},${p2y} ${p3x},${p3y} ${p4x},${p4y}`
      );
      clip.appendChild(poly);
      defs.appendChild(clip);
      svg.appendChild(defs);

      // Outline als echte Vektorlinie
      if (outlineMm > 0) {
        const outlineLine = document.createElementNS(SVG_NS, "line");
        outlineLine.setAttribute("x1", x1mm);
        outlineLine.setAttribute("y1", y1mm);
        outlineLine.setAttribute("x2", x2mm);
        outlineLine.setAttribute("y2", y2mm);
        outlineLine.setAttribute("stroke", outlineColor);
        outlineLine.setAttribute("stroke-width", strokeWidthMm + 2 * outlineMm);
        outlineLine.setAttribute("stroke-linecap", "butt");
        svg.appendChild(outlineLine);
      }

      // Innenfläche clippen
      const g = document.createElementNS(SVG_NS, "g");
      g.setAttribute("clip-path", `url(#${clipId})`);

      // weiße Grundfläche innerhalb der Linie
      const bg = document.createElementNS(SVG_NS, "rect");
      bg.setAttribute("x", 0);
      bg.setAttribute("y", 0);
      bg.setAttribute("width", bwMm);
      bg.setAttribute("height", bhMm);
      bg.setAttribute("fill", "#ffffff");
      g.appendChild(bg);

      // echtes Schachbrett als Vektorrechtecke
      const rows = Math.ceil(bhMm / cellMm);
      const cols = Math.ceil(bwMm / cellMm);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 !== 0) continue;

          const rect = document.createElementNS(SVG_NS, "rect");
          rect.setAttribute("x", c * cellMm);
          rect.setAttribute("y", r * cellMm);
          rect.setAttribute("width", cellMm);
          rect.setAttribute("height", cellMm);
          rect.setAttribute("fill", fillColor);
          g.appendChild(rect);
        }
      }

      svg.appendChild(g);

      await svg2pdf(svg, pdf, {
        xOffset: toPdfX(minXpx),
        yOffset: toPdfY(minYpx),
        scale: 1
      });
    }



    async function exportCanvasToPDF() {
      // Offene Text-Editoren sauber schließen
      const editor = document.getElementById("text-editor");
      if (editor) editor.blur(); // dein Blur-Handler speichert & räumt auf

      const jsPDF = window.jsPDF;
      if (!jsPDF) { alert("jsPDF nicht geladen!"); return; }
      // ...


      const paper = currentPaperSize;
      const pdf = new jsPDF({
        orientation: paper.width > paper.height ? "landscape" : "portrait",
        unit: "mm",
        format: [paper.width, paper.height],
      });

      // ISO-Rahmen
      drawISOFrame(pdf, paper.width, paper.height, 10);

      // --- Linien (vektoriell) ---
      for (const line of savedLines) {
        if (!isLineVisible(line)) continue;

        const props = lineTypes[line.type] || lineTypes.hauptgleis;

        // Pattern-Linien kann jsPDF nicht als Stroke-Pattern: daher rasterisieren
        if (props.pattern) {
          const baseColor = sanitizeColor(props.color || "#000000", "#000000");

          await exportPatternLineAsVector(pdf, line, {
            ...props,
            color: baseColor,
            fixedColor: true
          });

          continue;
        }

        // Standard: normal vektoriell
        const phaseKey = line.phase || PHASES.IST;
        const css = (props.fixedColor ? (props.color || "#000000") : (PHASE_COLORS[phaseKey] || "#000000"));

        const { r, g, b } = colorToRgb(css);
        pdf.setDrawColor(r, g, b);

        pdf.setLineWidth(props.width * PX_TO_MM);

        if (pdf.setLineDash) {
          if (props.dash && props.dash.length) pdf.setLineDash(props.dash.map(toPdfSize), 0);
          else pdf.setLineDash();
        }

        if (pdf.setLineCap) pdf.setLineCap("round");

        pdf.line(
          toPdfX(line.start.x),
          toPdfY(line.start.y),
          toPdfX(line.end.x),
          toPdfY(line.end.y)
        );
      }
      if (pdf.setLineDash) pdf.setLineDash(); // zurücksetzen
      // zurücksetzen

      // nach dem Linien-Loop optional wieder zurücksetzen:
      if (pdf.setLineDash) pdf.setLineDash();

      // --- Plattformen (vektoriell) ---
      // --- Plattformen (vektoriell) ---
      for (const el of savedElements) {
        if (el.type !== "platform") continue;
        if (!isElementVisible(el)) continue;

        const p = pixelElements[el.id];
        const wmm = toPdfSize(el.width ?? p.width);
        const hmm = toPdfSize(el.height ?? p.height);
        const gapmm = toPdfSize(p.gapPx);
        const xmm = toPdfX(el.x);
        const ymm = toPdfY(el.y);

        // Strichstärken (mm)
        const PLATFORM_OUTLINE_MM = 0.1;
        const PLATFORM_STRIPE_MM = 0.05;

        // ⬇️ HIER einfügen (statt pdf.setDrawColor(0))
        const { r, g, b } = colorToRgb(getPhaseColor(el.phase));
        pdf.setDrawColor(r, g, b);         // Rahmen + Streifen in Phasenfarbe
        // ⬆️

        pdf.setLineWidth(PLATFORM_OUTLINE_MM);
        pdf.rect(xmm, ymm, wmm, hmm);      // Außenrahmen

        // Kantenstreifen
        const side = p.edgeSide || (p.doubleSided ? "both" : "bottom");
        if (side === "both") {
          pdf.rect(xmm, ymm, wmm, gapmm);                 // oben
          pdf.rect(xmm, ymm + hmm - gapmm, wmm, gapmm);   // unten
        } else if (side === "top") {
          pdf.rect(xmm, ymm, wmm, gapmm);                 // nur oben
        } else {
          pdf.rect(xmm, ymm + hmm - gapmm, wmm, gapmm);   // nur unten
        }
      }

      // --- Text-Boxen (vektoriell: Füllung, Rahmen, zentrierter Text) ---
      // --- Text-Boxen (vektor) ---
      for (const el of savedElements) {
        if (el.type !== "text_box") continue;
        if (!isElementVisible(el)) continue;
        if (!sanitizeElementForExport(el)) continue;

        const xmm = toPdfX(el.x);
        const ymm = toPdfY(el.y);
        const wmm = toPdfSize(el.width);
        const hmm = toPdfSize(el.height);

        const fill = colorToRgb(el.fillColor || "#FFFFFF");
        const border = colorToRgb(el.borderColor || getPhaseColor(el.phase));
        const text = colorToRgb(el.textColor || el.color || getPhaseColor(el.phase));

        pdf.setFillColor(fill.r, fill.g, fill.b);
        pdf.setDrawColor(border.r, border.g, border.b);
        pdf.setLineWidth(0.2);
        pdf.rect(xmm, ymm, wmm, hmm, "FD");

        const fontPx = el.fontSize || 6;
        let style = "normal";
        if (el.fontWeight === "bold") style = "bold";
        if (el.fontStyle === "italic") style = "italic";
        try { pdf.setFont("helvetica", style); } catch (_) { pdf.setFont("helvetica", "normal"); }

        pdfCenteredMultilineText(
          pdf,
          el.text || "",
          xmm,
          ymm,
          wmm,
          hmm,
          fontPx,
          `rgb(${text.r}, ${text.g}, ${text.b})`,
          el.align || "center"
        );
      }

      // --- Bilder: einzeln als PNG in das PDF rastern ---
      try {
        const embedResult = await ensureLibraryAssetsEmbedded();
        if (embedResult?.failed?.length) {
          console.warn(`Bibliotheksbilder teilweise nicht eingebettet: ${embedResult.failed.length}`);
        }

        for (const el of savedElements) {
          if (el.type !== "image") continue;
          if (!isElementVisible(el)) continue;

          const imgData = getImageDataForElement(el);
          if (!imgData || !imgData.img) continue;

          const rot = Number.isFinite(el.rotation) ? ((el.rotation % 360) + 360) % 360 : 0;
          const w_px = el.width ?? imgData.width;
          const h_px = el.height ?? imgData.height;
          const x_px = el.x;
          const y_px = el.y;

          try {
            const rotRad = rot * Math.PI / 180;
            const bboxW = Math.abs(w_px * Math.cos(rotRad)) + Math.abs(h_px * Math.sin(rotRad));
            const bboxH = Math.abs(w_px * Math.sin(rotRad)) + Math.abs(h_px * Math.cos(rotRad));

            const EXPORT_DPI = 600;
            const scaleDPI = EXPORT_DPI / 96;

            const off = document.createElement("canvas");
            off.width = Math.max(1, Math.ceil(bboxW * scaleDPI) + 8);
            off.height = Math.max(1, Math.ceil(bboxH * scaleDPI) + 8);

            const octx = off.getContext("2d", { alpha: true });
            octx.clearRect(0, 0, off.width, off.height);
            octx.imageSmoothingEnabled = true;
            octx.imageSmoothingQuality = "high";

            octx.translate(off.width / 2, off.height / 2);
            octx.rotate(rotRad);
            octx.drawImage(
              imgData.img,
              -(w_px * scaleDPI) / 2,
              -(h_px * scaleDPI) / 2,
              w_px * scaleDPI,
              h_px * scaleDPI
            );

            const dataUrl = off.toDataURL("image/png");
            const pdfX = toPdfX(x_px + w_px / 2 - bboxW / 2);
            const pdfY = toPdfY(y_px + h_px / 2 - bboxH / 2);
            const pdfW = toPdfSize(bboxW);
            const pdfH = toPdfSize(bboxH);

            pdf.addImage(dataUrl, "PNG", pdfX, pdfY, pdfW, pdfH, undefined, "NONE");
          } catch (imgErr) {
            console.error("Bildelement konnte nicht ins PDF gerendert werden", el.id, imgErr);
          }
        }
      } catch (err) {
        console.error("Bibliotheksbilder konnten vor dem PDF-Export nicht vorbereitet werden", err);
      }

      // --- Texte (Top-Left Pivot wie im Canvas) ---
      savedElements.forEach((el) => {
        if (el.type !== "text") return;
        if (!isElementVisible(el)) return;

        const rotDeg = Number.isFinite(el.rotation) ? ((el.rotation % 360) + 360) % 360 : 0;
        const x_mm = toPdfX(el.x);
        const y_mm = toPdfY(el.y);

        pdf.saveGraphicsState();
        if (rotDeg) pdf.rotate(rotDeg, { origin: [x_mm, y_mm] });

        // Font & Farbe
        const sizePx = el.fontSize || 6;
        pdf.setFont("helvetica", (el.fontWeight === "bold" ? "bold" : "normal"));
        if (el.fontStyle === "italic") {
          try { pdf.setFont("helvetica", "italic"); } catch (_) { }
        }
        pdf.setFontSize(sizePx * 0.75); // grobe px→pt Annäherung
        const { r, g, b } = colorToRgb(getPhaseColor(el.phase));  // ◀︎
        pdf.setTextColor(r, g, b);


        // gleiches Padding wie Canvas (2px,2px), kleiner Baseline-Offset
        const w_mm = toPdfSize(el.width || 120);
        const h_mm = toPdfSize(el.height || 30);
        const align = (el.align === "left" || el.align === "right" || el.align === "center") ? el.align : "center";
        const padMM = toPdfSize(2);

        const lines = String(el.text || "").split("\n");
        const lhMM = toPdfSize(sizePx * 1.2);
        const startY = y_mm + (h_mm - lines.length * lhMM) / 2 + lhMM * 0.8;

        let textX = x_mm + w_mm / 2;
        if (align === "left") textX = x_mm + padMM;
        if (align === "right") textX = x_mm + w_mm - padMM;

        lines.forEach((line, i) => {
          pdf.text(line, textX, startY + i * lhMM, {
            align,
            baseline: "alphabetic"
          });
        });

        pdf.restoreGraphicsState();
      });





      // --- Schriftfeld (ISO 7200) ---
      // --- Schriftfeld: PNG hat Vorrang; sonst vektoriell (ISO 7200) ---
      const tbMM = getTitleBlockRectMM(paper); // {x,y,w,h} in mm

      if (titleBlockImage && titleBlockImageURL) {
        const key = detectASizeKey(paper.width, paper.height);
        const growW = (key && TB_GROW_MM_BY_SIZE[key]) ? TB_GROW_MM_BY_SIZE[key] : 0;

        // Zielbreite: volle TB-Breite + Korrektur (ab A2 +2mm), Höhe proportional
        const ratio = titleBlockImage.height / titleBlockImage.width;
        const wmm = tbMM.w + growW;
        const hmm = wmm * ratio;

        // unten bündig; zusätzlich: 0,1 mm links/oben verschieben
        const xmm = tbMM.x - growW + TB_FINE_OFFSET_MM.x; // rechts bündig halten → nach links um growW
        const ymm = tbMM.y + (tbMM.h - hmm) + TB_FINE_OFFSET_MM.y;

        pdf.addImage(titleBlockImageURL, "PNG", xmm, ymm, wmm, hmm, undefined, "NONE");
      } else if (titleBlockEnabled) {
        drawISO7200TitleBlock(pdf, paper.width, paper.height, titleBlockData);
      }


      // --- Falzmarken nach DIN 824 (nur für DIN-A-Formate) ---
      try {
        const pageWmm = paper.width;
        const pageHmm = paper.height;
        const { vertical, horizontal } = getDin824FoldLinesMM(pageWmm, pageHmm);

        // nur zeichnen, wenn es Faltlinien gibt (A3–A0)
        if (vertical.length || horizontal.length) {
          drawFoldTicks(pdf, pageWmm, pageHmm, { vertical, horizontal });
        }
      } catch (e) {
        console.warn("Falzmarken (DIN 824) konnten nicht gezeichnet werden:", e);
      }


      pdf.save("Gleisplan_vektor.pdf");
    }

    function restoreUploadedAssets(map) {
      if (!map || typeof map !== "object") return;
      for (const [id, src] of Object.entries(map)) {
        if (!src) continue;
        uploadedAssets[id] = src;

        const img = new Image();
        img.onload = () => {
          // Default-Anzeigegröße wie beim Upload
          const maxW = 160;
          const scaleFactor = Math.min(1, maxW / img.naturalWidth);
          const w = Math.max(10, Math.round(img.naturalWidth * scaleFactor));
          const h = Math.max(10, Math.round(img.naturalHeight * scaleFactor));

          pixelElements[id] = {
            width: w,
            height: h,
            imgsByPhase: {
              [PHASES.IST]: { img, src },
              [PHASES.RUECKBAU]: { img, src },
              [PHASES.NEUBAU]: { img, src }
            }
          };
          elementDefinitions[id] = { id, type: "image", src, _uploadedAsset: true };

          // Falls alte Projekte keine width/height am Element hatten:
          for (const el of savedElements) {
            if (el.type === "image" && el.id === id) {
              if (el.width == null) el.width = w;
              if (el.height == null) el.height = h;
            }
          }
          redrawCanvas();
        };
        img.onerror = () => { /* ignore */ };
        img.src = src;
      }
    }

    function importPlan(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const planData = JSON.parse(e.target.result);

          // Upload-Bilder wiederherstellen (muss vor dem Zeichnen passieren)
          restoreUploadedAssets(planData.uploadedAssets);

          // Basisdaten wiederherstellen
          paperSelector.value = planData.paperSize || "A3_landscape";
          setCanvasSize(paperSelector.value);
          scale = planData.scale || 1;
          origin = planData.origin || { x: 0, y: 0 };
          savedLines.length = 0;
          savedElements.length = 0;
          currentPhase = planData.currentPhase || PHASES.IST;
          setPhase(currentPhase);
          customPropTemplates = planData.customPropTemplates || {};


          titleBlockEnabled = !!planData.titleBlockEnabled;
          if (typeof updateTitleblockButton === "function") {
            updateTitleblockButton();
          }
          if (planData.titleBlockData) {
            titleBlockData = { ...titleBlockData, ...planData.titleBlockData };
          }
          redrawCanvas();


          // Inhalte übernehmen
          if (Array.isArray(planData.savedLines))
            savedLines.push(...planData.savedLines);
          if (Array.isArray(planData.savedElements))
            savedElements.push(...planData.savedElements);

          // Fallback: Image-Größen setzen, falls nicht im JSON
          savedElements.forEach((el) => {
            if (el.type !== "image") return;
            const pe = pixelElements[el.id];
            if (!pe) return;
            if (el.width == null) el.width = pe.width;
            if (el.height == null) el.height = pe.height;
          });

          redrawCanvas();
          updateScaleIndicator();
          renderPropertiesForSelection();


          alert("Plan erfolgreich geladen!");
        } catch (err) {

        }
      };
      reader.readAsText(file);
      pushHistory("import");
    }

    function renderVisibleImagesToCanvas(targetCtx) {
      for (const element of savedElements) {
        if (element.type !== "image") continue;
        if (!isElementVisible(element)) continue;

        const elData = getImageDataForElement(element);
        if (!elData || !elData.img) continue;

        const centerX = element.x + w / 2;

        targetCtx.save();

        targetCtx.rotate(((element.rotation || 0) * Math.PI) / 180);
        targetCtx.drawImage(elData.img, -w / 2, -h / 2, w, h);
        targetCtx.restore();
      }
    }

        }
      } catch (err) {
        console.error("Bibliotheksbilder konnten nicht vorbereitet werden", err);
      }
      createControlsPanel();
      setCanvasSize(paperSelector.value || "A3_landscape");
      initPropertiesPanelDelegation();
      // Buttons aktivieren
      document.getElementById("set-scale-one").addEventListener("click", () => {
        scale = 1;
        updateScaleIndicator();
        redrawCanvas();
      });
      updateScaleIndicator();
      updateTitleblockButton();   // Schriftfeld-Button initial korrekt einfärben
      redrawCanvas();
      pushHistory("init");

      document
        .getElementById("export-pdf")
        .addEventListener("click", exportCanvasToPDF);

      document.getElementById("toggle-frame").addEventListener("click", (e) => {
        showExportFrame = !showExportFrame;
        e.target.textContent = showExportFrame ? "Exportrahmen:AN" : "Exportrahmen:AUS";
        redrawCanvas();
      });

      updateScaleIndicator();
      redrawCanvas();
      pushHistory("init");  // Ausgangszustand
    }

    // =========================================================
    // Bilder-Upload (nicht phasenabhängig) + Platzieren im Canvas
    // =========================================================

    const uploadAssetBtn = document.getElementById("upload-asset-btn");
    const assetFileInput = document.getElementById("asset-file-input");
    const assetThumbs = document.getElementById("asset-thumbs");
    const assetPlaceToggle = document.getElementById("asset-place-toggle");

    let placingAssetId = null;   // wenn gesetzt: nächster Canvas-Klick platziert dieses Bild
    let selectedAssetId = null;  // aktuell ausgewähltes importiertes Bild

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result));
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }




    async function registerUploadedImage(file) {
      const src = await fileToDataURL(file);
      const id = `userimg_${Date.now()}_${Math.random().toString(16).slice(2)}`;

      const img = new Image();
      img.src = src;
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });

      // Default-Anzeigegröße (bleibt wie bei dir)
      const maxW = 160;
      const scaleFactor = Math.min(1, maxW / img.naturalWidth);
      const w = Math.max(10, Math.round(img.naturalWidth * scaleFactor));
      const h = Math.max(10, Math.round(img.naturalHeight * scaleFactor));

      pixelElements[id] = {
        width: w,
        height: h,
        imgsByPhase: {
          [PHASES.IST]: { img, src },
          [PHASES.RUECKBAU]: { img, src },
          [PHASES.NEUBAU]: { img, src }
        }
      };
      uploadedAssets[id] = src;
      elementDefinitions[id] = { id, type: "image", src, _uploadedAsset: true };

      // ✅ NEU: SOFORT ins Canvas platzieren (zentriert, gesnappt)
      const x = getVerticalSnap((canvas.width / 2) - w / 2);
      const y = getClosestSnapY((canvas.height / 2) - h / 2);

      savedElements.push({
        type: "image",
        id,
        x, y,
        width: w,
        height: h,
        rotation: 0,
        phase: PHASES.IST
      });
      selectedElementIndex = savedElements.length - 1;
      selectedLineIndex = null;

      redrawCanvas();
      pushHistory("upload image");
    }


    // UI-Wiring
    uploadAssetBtn?.addEventListener("click", () => assetFileInput?.click());

    assetFileInput?.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;

      for (const f of files) {
        if (!f.type?.startsWith("image/")) continue;
        await registerUploadedImage(f);
      }
      assetFileInput.value = "";
    });



    // ESC bricht Platzieren ab
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (!placingAssetId) return;
      placingAssetId = null;
    });

    const uploadBtn = document.getElementById("upload-titleblock-png");
    const removeBtn = document.getElementById("remove-titleblock-png");
    const fileIn = document.getElementById("titleblock-png-input");

    uploadBtn.addEventListener("click", () => fileIn.click());

    fileIn.addEventListener("change", () => {
      const f = fileIn.files?.[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        const url = reader.result; // DataURL
        const img = new Image();
        img.onload = () => {
          titleBlockImage = img;
          titleBlockImageURL = url;
          removeBtn.style.display = "inline-block";
          redrawCanvas();
        };
        img.src = url;
      };
      reader.readAsDataURL(f);
      redrawCanvas();
      pushHistory("titleblock png add");
    });

    removeBtn.addEventListener("click", () => {
      titleBlockImage = null;
      titleBlockImageURL = null;
      fileIn.value = "";
      removeBtn.style.display = "none";
      redrawCanvas();
      pushHistory("titleblock png remove");
    });

    // Schriftfeld: Toggle & Editor
    // Schriftfeld: Toggle & Editor
    const tbToggleBtn = document.getElementById("toggle-titleblock-btn");
    const tbModal = document.getElementById("titleblock-modal");
    const tbOpen = document.getElementById("edit-titleblock");
    const tbSave = document.getElementById("tb-save");
    const tbCancel = document.getElementById("tb-cancel");

    function updateTitleblockButton() {
      if (!tbToggleBtn) return;
      tbToggleBtn.classList.toggle("active", titleBlockEnabled);
      tbToggleBtn.classList.toggle("inactive", !titleBlockEnabled);
      tbToggleBtn.textContent = titleBlockEnabled ? "Schriftfeld EIN" : "Schriftfeld AUS";
    }

    // Button klickt den Zustand um
    tbToggleBtn?.addEventListener("click", () => {
      titleBlockEnabled = !titleBlockEnabled;
      updateTitleblockButton();
      redrawCanvas();
    });


    // Editor öffnen
    tbOpen.addEventListener("click", () => {
      // Felder mit aktuellem Zustand befüllen
      document.getElementById("tb-title-text").value = titleBlockData.title || "";
      document.getElementById("tb-drawing-number").value = titleBlockData.drawingNumber || "";
      document.getElementById("tb-project").value = titleBlockData.project || "";
      document.getElementById("tb-revision").value = titleBlockData.revision || "";
      document.getElementById("tb-scale").value = titleBlockData.scaleText || "";
      document.getElementById("tb-sheet").value = titleBlockData.sheet || "";
      document.getElementById("tb-date").value = titleBlockData.date || "";
      document.getElementById("tb-drawn-by").value = titleBlockData.drawnBy || "";
      document.getElementById("tb-checked-by").value = titleBlockData.checkedBy || "";
      document.getElementById("tb-approved-by").value = titleBlockData.approvedBy || "";
      document.getElementById("tb-company").value = titleBlockData.company || "";
      document.getElementById("tb-notes").value = titleBlockData.notes || "";
      tbModal.style.display = "flex";
    });

    // Editor speichern
    tbSave.addEventListener("click", () => {
      titleBlockData = {
        title: document.getElementById("tb-title-text").value.trim(),
        drawingNumber: document.getElementById("tb-drawing-number").value.trim(),
        project: document.getElementById("tb-project").value.trim(),
        revision: document.getElementById("tb-revision").value.trim(),
        scaleText: document.getElementById("tb-scale").value.trim(),
        sheet: document.getElementById("tb-sheet").value.trim(),
        date: document.getElementById("tb-date").value,
        drawnBy: document.getElementById("tb-drawn-by").value.trim(),
        checkedBy: document.getElementById("tb-checked-by").value.trim(),
        approvedBy: document.getElementById("tb-approved-by").value.trim(),
        company: document.getElementById("tb-company").value.trim(),
        notes: document.getElementById("tb-notes").value.trim()
      };
      tbModal.style.display = "none";
    });

    // Editor schließen
    tbCancel.addEventListener("click", () => tbModal.style.display = "none");
    tbModal.addEventListener("click", (e) => {
      if (e.target === tbModal) tbModal.style.display = "none"; // Klick auf Overlay
    });

    // Hilfe-Modal
    const helpModal = document.getElementById("help-modal");
    const helpOpenBtn = document.getElementById("open-help-modal");
    const helpCloseBtn = document.getElementById("help-close");

    helpOpenBtn?.addEventListener("click", () => {
      if (helpModal) helpModal.style.display = "flex";
    });

    helpCloseBtn?.addEventListener("click", () => {
      if (helpModal) helpModal.style.display = "none";
    });

    helpModal?.addEventListener("click", (e) => {
      if (e.target === helpModal) helpModal.style.display = "none";
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && helpModal?.style.display === "flex") {
        helpModal.style.display = "none";
      }
    });
    // Modus-Buttons
    const groupAddBtn = document.getElementById("group-add-btn");
    const groupRemoveBtn = document.getElementById("group-remove-btn");
    const duplicateBtn = document.getElementById("duplicate-btn");


    function updateGroupAddButtonUI() {
      if (!groupAddBtn) return;
      const active = groupMode === "add";

      // gleiche aktive Optik wie beim Verschiebe-Button
      groupAddBtn.classList.toggle("is-active", active);

      // zusätzlich explizit grüne Schrift
      if (active) {
        groupAddBtn.style.color = "#2e7d32";
      } else {
        groupAddBtn.style.color = "";
      }
    }
    duplicateBtn?.addEventListener("click", () => {
      duplicateCurrentSelection();
    });



    const btnIst = document.getElementById("mode-ist");
    const btnRueckbau = document.getElementById("mode-rueckbau");
    const btnNeubau = document.getElementById("mode-neubau");


    function setPhase(p) {
      currentPhase = p;
      [btnIst, btnRueckbau, btnNeubau].forEach(b => b.classList.remove("is-active"));
      if (p === PHASES.IST) btnIst.classList.add("is-active");
      if (p === PHASES.RUECKBAU) btnRueckbau.classList.add("is-active");
      if (p === PHASES.NEUBAU) btnNeubau.classList.add("is-active");

      updatePaletteIconsForPhase(); // <--- neue Icons
      redrawCanvas();               // Linien & vorhandene Elemente bleiben wie gespeichert
    }

    btnIst?.addEventListener("click", () => setPhase(PHASES.IST));
    btnRueckbau?.addEventListener("click", () => setPhase(PHASES.RUECKBAU));
    btnNeubau?.addEventListener("click", () => setPhase(PHASES.NEUBAU));
    // Verschieben-Button
    const moveModeToggle = document.getElementById("move-mode-toggle");

    function setMoveMode(on) {
      moveMode = !!on;
      // ✅ Mode-Konflikt vermeiden: MoveMode killt Zeichnen
      if (moveMode) {
        drawingMode = false;
        isDrawing = false;
        previewLine = null;

        const drawBtn = document.getElementById("toggle-draw-mode");
        if (drawBtn) {
          drawBtn.setAttribute("aria-pressed", "false");
          drawBtn.textContent = "Zeichenmodus: AUS";
          drawBtn.style.backgroundColor = "#ffffff";
        }
      }

      moveSelectionRect = null;
      moveSelectedItems = [];
      isSelectingMoveArea = false;
      isDraggingMoveSelection = false;
      moveModeToggle.textContent = moveMode ? "Verschieben: AN" : "Verschieben: AUS";
      moveModeToggle.classList.toggle("is-active", moveMode);
      canvas.style.cursor = moveMode ? "crosshair" : "default";
      redrawCanvas();
    }

    moveModeToggle?.addEventListener("click", () => setMoveMode(!moveMode));



    // Gruppe anlegen: Rechteck aufziehen, mit Enter bestätigen
    groupAddBtn?.addEventListener("click", () => {
      setMoveMode(false);
      groupMode = "add";
      groupSelectionRect = null;
      groupSelectionStart = null;
      activeGroupId = null;
      updateGroupAddButtonUI();
      redrawCanvas();
    });


    // Gruppe auflösen, wenn eine Gruppe ausgewählt ist
    groupRemoveBtn?.addEventListener("click", () => {
      if (!activeGroupId) return;
      removeGroup(activeGroupId);
      activeGroupId = null;
      redrawCanvas();
      pushHistory("remove group");
    });






    // Start
    init();
  });

</script>
</body>
